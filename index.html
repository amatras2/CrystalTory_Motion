<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CrystalTory_Motion V5.2 (Pro Editor)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        :root {
            --tuxedo-black: #0a0a0a; --tuxedo-dark: #1a1a1a;
            --tuxedo-white: #f5f5f5; --point-silver: #a0a0a0;
            --highlight-green: #bfff00; --highlight-blue: #00d2ff; --highlight-red: #ff4757; --border: #2d2d2d;
        }

        body {
            background-color: var(--tuxedo-black); color: var(--tuxedo-white);
            font-family: 'Pretendard', sans-serif; margin: 0;
            display: flex; flex-direction: column; min-height: 100vh;
        }

        header {
            padding: 15px 25px; background: var(--tuxedo-dark); border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 50;
        }
        .logo { font-size: 1.2rem; font-weight: 800; }
        .logo span { color: var(--point-silver); font-weight: 300; }
        .status-badge { font-size: 0.75rem; padding: 4px 8px; border-radius: 4px; background: #333; color: #aaa; transition: 0.3s; }

        main { display: flex; flex-direction: column; padding: 15px; gap: 15px; flex: 1; }

        /* 상단 파일 업로드 버튼 그룹 */
        .file-ops { display: flex; gap: 10px; }
        .file-btn { 
            flex: 1; background: #222; border: 1px solid #444; color: #ddd; 
            padding: 10px; border-radius: 8px; text-align: center; font-size: 0.85rem; cursor: pointer;
        }
        .file-btn:hover { background: #333; }
        .hidden-input { display: none; }

        .player-container {
            position: relative; background: #000; border-radius: 12px;
            overflow: hidden; aspect-ratio: 16 / 9; border: 1px solid var(--border);
            cursor: grab; width: 100%; transition: border 0.2s;
        }
        .player-container:active { cursor: grabbing; }
        #motionCanvas { width: 100%; height: 100%; display: block; touch-action: none; }
        
        .playback-controls { display: flex; justify-content: center; gap: 20px; align-items: center; margin-top: 5px; }
        .skip-btn { background: #222; border: 1px solid #444; color: #ddd; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; }

        .sliders-group {
            display: flex; flex-direction: column; gap: 12px; 
            background: #111; padding: 12px; border-radius: 8px; border: 1px solid var(--border);
        }
        .slider-row { display: flex; align-items: center; gap: 15px; font-size: 0.85rem; color: var(--point-silver); }
        .slider-row label { min-width: 65px; font-weight: bold; }
        input[type=range] { flex: 1; accent-color: var(--highlight-green); cursor: pointer; }
        .val-display { min-width: 40px; text-align: right; color: var(--highlight-green); font-weight: bold; }

        .auto-zoom-btn {
            background: #333; color: white; border: 1px solid #555; padding: 4px 8px;
            border-radius: 4px; font-size: 0.7rem; cursor: pointer; transition: 0.2s;
        }
        .auto-zoom-btn.active { background: #002200; color: var(--highlight-green); border-color: var(--highlight-green); }

        .timeline-editor {
            background: var(--tuxedo-dark); border-radius: 12px; border: 1px solid var(--border);
            display: flex; flex-direction: column; min-height: 250px;
        }
        .timeline-header { padding: 12px 15px; border-bottom: 1px solid var(--border); font-size: 0.85rem; font-weight: bold; color: var(--point-silver); display: flex; justify-content: space-between; align-items: center; }
        
        .segment-list { padding: 10px; display: flex; flex-direction: column; gap: 8px; }
        .segment-item { 
            display: flex; align-items: center; gap: 10px; background: #111; 
            padding: 10px; border-radius: 8px; border: 1px solid #222;
        }
        .segment-time { font-size: 0.75rem; color: var(--highlight-green); min-width: 90px; text-align: center; }
        .segment-label-select { 
            background: #222; color: white; border: 1px solid #444; padding: 6px; 
            border-radius: 4px; font-size: 0.8rem; flex: 1; 
        }

        .control-panel { background: var(--tuxedo-dark); padding: 15px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px;}
        .btn-group { display: flex; gap: 10px; }
        .action-btn { flex: 1; background: #222; color: white; border: 1px solid #444; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.85rem; }
        .btn-primary { border-color: var(--highlight-blue); color: var(--highlight-blue); }
    </style>
</head>
<body>

<header>
    <div class="logo">CrystalTory <span>Motion</span></div>
    <div style="display: flex; gap: 10px; align-items: center;">
        <span id="aiStatus" class="status-badge">🧠 준비중...</span>
        <div style="font-size: 0.8rem; color: var(--point-silver);">V5.2 🐾</div>
    </div>
</header>

<main>
    <div class="file-ops">
        <label class="file-btn">
            🎬 1. 영상 불러오기 (MP4)
            <input type="file" id="videoUpload" accept="video/*" class="hidden-input">
        </label>
        <label class="file-btn" style="border-color: var(--highlight-blue); color: var(--highlight-blue);">
            📁 2. 작업 불러오기 (JSON)
            <input type="file" id="jsonUpload" accept=".json" class="hidden-input">
        </label>
    </div>

    <div class="player-container" id="playerContainer">
        <canvas id="motionCanvas"></canvas>
    </div>

    <div class="playback-controls">
        <button class="skip-btn" onclick="skip(-10)">-10초</button>
        <button onclick="togglePlay()" id="playBtn" style="background:none; border:none; color:white; font-size:2rem; cursor:pointer; width: 50px;">▶</button>
        <button class="skip-btn" onclick="skip(10)">+10초</button>
    </div>
    
    <div style="display: flex; gap: 10px; align-items: center; margin-top: 5px;">
        <input type="range" id="seekBar" value="0" step="0.1" style="flex: 1;">
        <span id="timeDisplay" style="font-size:0.75rem; min-width:80px; text-align:right;">00:00 / 00:00</span>
    </div>

    <div class="sliders-group">
        <div class="slider-row">
            <label>줌 배율</label>
            <input type="range" id="zoomRange" min="1" max="8" step="0.1" value="2.5">
            <span class="val-display" id="zoomVal">2.5x</span>
            <button id="btnAutoZoom" class="auto-zoom-btn" onclick="toggleAutoZoom()">오토줌 OFF</button>
        </div>
        <div class="slider-row">
            <label>수동 감도</label>
            <input type="range" id="panRange" min="1" max="5" step="0.5" value="2.5">
            <span class="val-display" id="panVal">2.5x</span>
        </div>
    </div>

    <div class="timeline-editor">
        <div class="timeline-header">
            <span>🎥 구간 편집 타임라인</span>
            <button onclick="autoGenerateSegments()" style="background:none; border:none; color:var(--highlight-blue); font-size:0.8rem; cursor:pointer; font-weight:bold;">⚡ 자동 구간 생성</button>
        </div>
        <div class="segment-list" id="segmentList">
            <p style="text-align:center; color:#555; font-size:0.8rem; padding: 20px 0;">작업을 불러오거나 자동 구간 생성을 눌러주세요.</p>
        </div>
    </div>

    <div class="control-panel">
        <div class="btn-group">
            <button class="action-btn" onclick="resetCenter()">🎯 중앙 초기화</button>
            <button class="action-btn btn-primary" onclick="exportData()">💾 최종 데이터 저장</button>
        </div>
    </div>
</main>

<video id="hiddenVideo" style="display:none;" playsinline muted></video>

<script>
    const video = document.getElementById('hiddenVideo');
    const canvas = document.getElementById('motionCanvas');
    const ctx = canvas.getContext('2d');
    const seekBar = document.getElementById('seekBar');
    const zoomRange = document.getElementById('zoomRange');
    const zoomVal = document.getElementById('zoomVal');
    const panRange = document.getElementById('panRange');
    const panVal = document.getElementById('panVal');
    const videoUpload = document.getElementById('videoUpload');
    const jsonUpload = document.getElementById('jsonUpload');
    const playBtn = document.getElementById('playBtn');
    const playerContainer = document.getElementById('playerContainer');
    const aiStatus = document.getElementById('aiStatus');
    const segmentListUI = document.getElementById('segmentList');
    const timeDisplay = document.getElementById('timeDisplay');
    const btnAutoZoom = document.getElementById('btnAutoZoom');

    // 카메라 및 줌 상태 변수
    let currentZoom = 2.5; // 실제 렌더링에 쓰이는 부드러운 줌
    let targetZoom = 2.5;  // AI가 목표로 하는 줌
    let isAutoZoom = false; // 오토줌 상태
    let panSensitivity = 2.5; 
    let centerX = 0; let centerY = 0;
    let targetX = 0; let targetY = 0;
    
    let isDragging = false;
    let lastMouseX = 0; let lastMouseY = 0;

    let trackData = []; 
    let segments = [];
    let model = null;
    let isDetecting = false;

    const MOTION_TAGS = ['기본 트래킹', '스타트', '슬라럼', '웨이크 진입', '점프', '에어 타임', '랜딩', '피니시'];

    // AI 엔진 로드
    cocoSsd.load().then(m => { 
        model = m; 
        aiStatus.innerText = "🟢 AI 준비 완료"; 
    });

    // 1. 영상 불러오기
    videoUpload.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            video.src = URL.createObjectURL(file);
            video.onloadedmetadata = () => {
                seekBar.max = video.duration;
                centerX = video.videoWidth / 2; centerY = video.videoHeight / 2;
                targetX = centerX; targetY = centerY;
                render();
            };
        }
    });

    // 2. V5.2 핵심: JSON 작업 데이터 불러오기
    jsonUpload.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            try {
                const data = JSON.parse(event.target.result);
                if (data.segments) {
                    segments = data.segments;
                    updateSegmentListUI();
                }
                if (data.trackData) {
                    trackData = data.trackData;
                }
                alert("✅ 작업 데이터를 성공적으로 불러왔습니다!\n(영상을 아직 안 여셨다면 영상 파일도 열어주세요.)");
            } catch(err) {
                alert("❌ 파일을 읽는 중 오류가 발생했습니다.");
            }
        };
        reader.readAsText(file);
    });

    function skip(amount) { 
        if(!isNaN(video.duration)) video.currentTime = Math.max(0, Math.min(video.duration, video.currentTime + amount)); 
    }

    function toggleAutoZoom() {
        isAutoZoom = !isAutoZoom;
        if (isAutoZoom) {
            btnAutoZoom.classList.add('active');
            btnAutoZoom.innerText = "✨ 오토줌 ON";
        } else {
            btnAutoZoom.classList.remove('active');
            btnAutoZoom.innerText = "오토줌 OFF";
            targetZoom = currentZoom; // 끄는 순간 현재 줌으로 고정
        }
    }

    // 슬라이더 조작 시 (수동 개입하면 오토줌을 슬쩍 꺼줍니다)
    zoomRange.addEventListener('input', (e) => { 
        if(isAutoZoom) toggleAutoZoom(); // 수동 조작 시 오토줌 자동 해제
        targetZoom = parseFloat(e.target.value); 
        currentZoom = targetZoom;
        zoomVal.innerText = targetZoom.toFixed(1) + 'x'; 
    });
    panRange.addEventListener('input', (e) => { panSensitivity = parseFloat(e.target.value); panVal.innerText = panSensitivity.toFixed(1) + 'x'; });

    // 수동 드래그 (팬 이동)
    function startDrag(e) { 
        isDragging = true; 
        lastMouseX = e.clientX || (e.touches && e.touches[0].clientX); 
        lastMouseY = e.clientY || (e.touches && e.touches[0].clientY); 
        playerContainer.style.borderColor = "var(--highlight-blue)";
    }
    function drag(e) {
        if (!isDragging) return;
        const clientX = e.clientX || (e.touches && e.touches[0].clientX);
        const clientY = e.clientY || (e.touches && e.touches[0].clientY);
        const dx = clientX - lastMouseX; const dy = clientY - lastMouseY;
        const scale = ((video.videoWidth / currentZoom) / playerContainer.offsetWidth) * panSensitivity;
        
        centerX -= dx * scale; centerY -= dy * scale;
        targetX = centerX; targetY = centerY;
        lastMouseX = clientX; lastMouseY = clientY;
    }
    function endDrag() { isDragging = false; playerContainer.style.borderColor = "var(--border)"; }
    
    playerContainer.addEventListener('mousedown', startDrag);
    window.addEventListener('mousemove', drag);
    window.addEventListener('mouseup', endDrag);
    playerContainer.addEventListener('touchstart', startDrag, {passive: false});
    window.addEventListener('touchmove', (e) => { if(isDragging) { e.preventDefault(); drag(e.touches[0]); } }, {passive: false});
    window.addEventListener('touchend', endDrag);

    // 3. V5.2 핵심: 다이나믹 오토 줌을 품은 AI 엔진
    async function detectPerson() {
        if (!model || video.paused || isDetecting || isDragging) return;
        isDetecting = true;
        try {
            const predictions = await model.detect(canvas); 
            const person = predictions.find(p => p.class === 'person');
            if (person) {
                // 1) 팬(Pan) 좌표 업데이트
                const bx = person.bbox[0] + person.bbox[2]/2;
                const by = person.bbox[1] + person.bbox[3]/2;
                const viewW = canvas.width / currentZoom; 
                const viewH = canvas.height / currentZoom;
                targetX = (centerX - viewW/2) + (bx / canvas.width) * viewW;
                targetY = (centerY - viewH/2) + (by / canvas.height) * viewH;
                
                // 2) 오토 줌(Auto Zoom) 계산 로직
                if (isAutoZoom) {
                    const personHeightOnCanvas = person.bbox[3]; // 화면에 그려진 사람의 픽셀 높이
                    const desiredHeight = canvas.height * 0.45;  // 사람이 화면 세로의 45% 정도 차지하길 원함
                    
                    // 사람이 작으면(멀어지면) 배율 증가, 크면(가까우면) 배율 감소
                    let calculatedZoom = currentZoom * (desiredHeight / personHeightOnCanvas);
                    
                    // 화면이 너무 널뛰지 않도록 한계선(Limit) 지정 (최소 1배 ~ 최대 8배)
                    targetZoom = Math.max(1.0, Math.min(calculatedZoom, 8.0));
                }
                
                aiStatus.style.color = "var(--highlight-green)";
            } else {
                aiStatus.style.color = "var(--point-silver)";
            }
        } finally { isDetecting = false; }
    }

    function autoGenerateSegments() {
        if (isNaN(video.duration) || video.duration === 0) { alert("영상을 먼저 불러와주세요."); return; }
        segments = [];
        const interval = 5; 
        for (let i = 0; i < video.duration; i += interval) {
            segments.push({ id: Date.now() + i, start: i, end: Math.min(i + interval, video.duration), label: '기본 트래킹' });
        }
        updateSegmentListUI();
    }

    function updateSegmentListUI() {
        segmentListUI.innerHTML = '';
        if (segments.length === 0) {
            segmentListUI.innerHTML = '<p style="text-align:center; color:#555; font-size:0.8rem; padding: 20px 0;">구간이 없습니다.</p>'; return;
        }
        segments.forEach(seg => {
            const item = document.createElement('div');
            item.className = 'segment-item';
            item.innerHTML = `
                <span class="segment-time">${formatTime(seg.start)}<br>~ ${formatTime(seg.end)}</span>
                <select class="segment-label-select" onchange="updateSegmentLabel(${seg.id}, this.value)">
                    ${MOTION_TAGS.map(tag => `<option value="${tag}" ${seg.label === tag ? 'selected' : ''}>${tag}</option>`).join('')}
                </select>
                <button onclick="video.currentTime=${seg.start}" style="background:none; border:1px solid #444; color:#aaa; font-size:0.75rem; padding:6px 10px; border-radius:4px; cursor:pointer;">이동</button>
                <button onclick="deleteSegment(${seg.id})" style="background:none; border:none; color:var(--highlight-red); cursor:pointer; font-size:0.85rem; font-weight:bold;">삭제</button>
            `;
            segmentListUI.appendChild(item);
        });
    }

    function updateSegmentLabel(id, newLabel) { const seg = segments.find(s => s.id === id); if (seg) seg.label = newLabel; }
    function deleteSegment(id) { segments = segments.filter(s => s.id !== id); updateSegmentListUI(); }

    function render() {
        if (video.videoWidth === 0) { requestAnimationFrame(render); return; }
        if (!video.paused && !isDragging) detectPerson();

        canvas.width = video.videoWidth; 
        canvas.height = video.videoHeight;

        // 화면 이동 스무딩 (짐벌 효과)
        if (!isDragging) {
            centerX += (targetX - centerX) * 0.15;
            centerY += (targetY - centerY) * 0.15;
            
            // 줌 스무딩 (오토줌 시 부드럽게 렌즈가 들어왔다 나감)
            currentZoom += (targetZoom - currentZoom) * 0.05; 
            
            // UI 슬라이더도 같이 움직이게 업데이트
            zoomRange.value = currentZoom;
            zoomVal.innerText = currentZoom.toFixed(1) + 'x';
        }

        const viewW = canvas.width / currentZoom; 
        const viewH = canvas.height / currentZoom;
        
        centerX = Math.max(viewW / 2, Math.min(canvas.width - viewW / 2, centerX));
        centerY = Math.max(viewH / 2, Math.min(canvas.height - viewH / 2, centerY));

        ctx.drawImage(video, centerX - viewW/2, centerY - viewH/2, viewW, viewH, 0, 0, canvas.width, canvas.height);
        
        if (!video.paused) {
            seekBar.value = video.currentTime;
            if (Math.floor(video.currentTime * 10) % 2 === 0) {
                trackData.push({t: video.currentTime.toFixed(2), x: centerX.toFixed(1), y: centerY.toFixed(1), z: currentZoom.toFixed(1)});
            }
        }
        timeDisplay.innerText = formatTime(video.currentTime) + " / " + formatTime(video.duration);
        requestAnimationFrame(render);
    }

    function exportData() {
        if (segments.length === 0 && trackData.length === 0) { alert("저장할 데이터가 없습니다."); return; }
        const data = { projectName: "CrystalTory_V5.2", segments, trackData };
        const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `motion_edit_${Math.floor(Date.now()/1000)}.json`;
        a.click();
    }

    function togglePlay() { video.paused ? (video.play(), playBtn.innerText = "Ⅱ") : (video.pause(), playBtn.innerText = "▶"); }
    function resetCenter() { targetX = video.videoWidth / 2; targetY = video.videoHeight / 2; targetZoom = 2.5; isAutoZoom = false; btnAutoZoom.className = "auto-zoom-btn"; btnAutoZoom.innerText = "오토줌 OFF";}
    function formatTime(s) { 
        if (isNaN(s)) return "00:00";
        const m = Math.floor(s / 60); const sec = Math.floor(s % 60);
        return m.toString().padStart(2, '0') + ":" + sec.toString().padStart(2, '0'); 
    }
    seekBar.addEventListener('input', () => { if(!isNaN(video.duration)) video.currentTime = seekBar.value; });
</script>
</body>
</html>

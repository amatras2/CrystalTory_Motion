<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrystalTory_Motion V2.1</title>
    <style>
        :root {
            --tuxedo-black: #0a0a0a;
            --tuxedo-dark: #1a1a1a;
            --tuxedo-white: #f5f5f5;
            --point-silver: #a0a0a0;
            --highlight-green: #bfff00;
            --border: #2d2d2d;
        }

        body {
            background-color: var(--tuxedo-black);
            color: var(--tuxedo-white);
            font-family: 'Pretendard', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            padding: 15px 25px;
            background: var(--tuxedo-dark);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo { font-size: 1.2rem; font-weight: 800; }
        .logo span { color: var(--point-silver); }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 15px;
            gap: 15px;
            overflow-y: auto;
        }

        /* --- Player Section --- */
        .player-container {
            position: relative;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 16 / 9;
            border: 1px solid var(--border);
        }

        #motionCanvas { width: 100%; height: 100%; display: block; }

        /* --- Navigation & Control --- */
        .control-panel {
            background: var(--tuxedo-dark);
            padding: 15px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* 재생바 (Seek Bar) */
        .seek-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        #seekBar {
            flex: 1;
            cursor: pointer;
            accent-color: var(--highlight-green);
        }

        .zoom-container {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 0.9rem;
            color: var(--point-silver);
        }
        #zoomRange { flex: 1; accent-color: var(--tuxedo-white); }

        /* --- Multi-Tag Grid --- */
        .segment-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .tag-btn {
            background: #222;
            border: 1px solid var(--border);
            color: var(--point-silver);
            padding: 12px 5px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        /* 선택되었을 때의 스타일 (토리가 눈을 뜬 것처럼!) */
        .tag-btn.active {
            background: var(--highlight-green);
            color: black;
            font-weight: bold;
            border-color: var(--highlight-green);
            box-shadow: 0 0 10px rgba(191, 255, 0, 0.3);
        }

        .clip-list { display: flex; flex-direction: column; gap: 10px; }
        .clip-card {
            background: var(--tuxedo-dark);
            border-radius: 10px;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-main {
            background: var(--tuxedo-white);
            color: black;
            border: none;
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        footer { padding: 10px; text-align: center; font-size: 0.7rem; color: #333; }
    </style>
</head>
<body>

<header>
    <div class="logo">CRYSTAL TORY <span>MOTION</span></div>
    <div style="font-size: 0.8rem; color: var(--point-silver);">수정아빠의 턱시도 작업실 🐾</div>
</header>

<main>
    <input type="file" id="videoUpload" accept="video/*">

    <div class="player-container">
        <canvas id="motionCanvas"></canvas>
    </div>

    <div class="control-panel">
        <div class="seek-container">
            <button onclick="togglePlay()" id="playBtn" style="background:none; border:none; color:white; font-size:1.2rem; cursor:pointer;">▶</button>
            <input type="range" id="seekBar" value="0" step="0.1">
            <span id="timeDisplay" style="font-size:0.75rem; min-width:75px;">00:00 / 00:00</span>
        </div>

        <div class="zoom-container">
            <span>ZOOM</span>
            <input type="range" id="zoomRange" min="1" max="5" step="0.1" value="1">
            <span id="zoomVal">1.0x</span>
        </div>
    </div>

    <div class="segment-grid">
        <button class="tag-btn" onclick="toggleTag(this)">스타트</button>
        <button class="tag-btn" onclick="toggleTag(this)">슬라럼</button>
        <button class="tag-btn" onclick="toggleTag(this)">로딩</button>
        <button class="tag-btn" onclick="toggleTag(this)">어프로치</button>
        <button class="tag-btn" onclick="toggleTag(this)">점프</button>
        <button class="tag-btn" onclick="toggleTag(this)">랜딩</button>
        <button class="tag-btn" onclick="toggleTag(this)">종료</button>
        <button class="btn-main" onclick="saveClip()">클립 저장</button>
    </div>

    <div class="clip-list" id="clipList">
        </div>
</main>

<footer>© 2026 CrystalTory_Motion | Created for Crystal, Tory & Dad</footer>

<video id="hiddenVideo" style="display:none;"></video>

<script>
    const video = document.getElementById('hiddenVideo');
    const canvas = document.getElementById('motionCanvas');
    const ctx = canvas.getContext('2d');
    const seekBar = document.getElementById('seekBar');
    const zoomRange = document.getElementById('zoomRange');
    const zoomVal = document.getElementById('zoomVal');
    const videoUpload = document.getElementById('videoUpload');
    const playBtn = document.getElementById('playBtn');

    let zoom = 1.0;

    videoUpload.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            video.src = URL.createObjectURL(file);
            video.onloadedmetadata = () => {
                seekBar.max = video.duration;
                render();
            };
        }
    });

    // 재생/일시정지 토글
    function togglePlay() {
        if (video.paused) {
            video.play();
            playBtn.innerText = "Ⅱ";
        } else {
            video.pause();
            playBtn.innerText = "▶";
        }
    }

    // 재생바 이동 (Seek)
    seekBar.addEventListener('input', () => {
        video.currentTime = seekBar.value;
    });

    // 줌 조절
    zoomRange.addEventListener('input', (e) => {
        zoom = e.target.value;
        zoomVal.innerText = zoom + 'x';
    });

    // 태그 중복 선택 (Toggle)
    function toggleTag(btn) {
        btn.classList.toggle('active');
    }

    // 클립 저장 로직 (간단히 리스트에 추가)
    function saveClip() {
        const activeTags = Array.from(document.querySelectorAll('.tag-btn.active'))
                                .map(btn => btn.innerText);
        
        if (activeTags.length === 0) {
            alert("선택된 태그가 없습니다!");
            return;
        }

        const time = formatTime(video.currentTime);
        const list = document.getElementById('clipList');
        const card = document.createElement('div');
        card.className = 'clip-card';
        card.innerHTML = `
            <div>
                <strong style="color:var(--highlight-green)">[${activeTags.join(', ')}]</strong>
                <div style="font-size:0.8rem; color:#888;">시간: ${time} | Zoom: ${zoom}x</div>
            </div>
            <button onclick="this.parentElement.remove()" style="background:none; border:none; color:#555; cursor:pointer;">&times;</button>
        `;
        list.prepend(card);
        
        // 저장 후 태그 초기화 (선택 사항)
        document.querySelectorAll('.tag-btn.active').forEach(btn => btn.classList.remove('active'));
    }

    function render() {
        canvas.width = video.videoWidth || 1280;
        canvas.height = video.videoHeight || 720;

        const sw = canvas.width / zoom;
        const sh = canvas.height / zoom;
        const sx = (canvas.width - sw) / 2;
        const sy = (canvas.height - sh) / 2;

        ctx.drawImage(video, sx, sy, sw, sh, 0, 0, canvas.width, canvas.height);
        
        // 재생바 위치 업데이트
        if (!video.paused) {
            seekBar.value = video.currentTime;
        }
        
        document.getElementById('timeDisplay').innerText = 
            formatTime(video.currentTime) + " / " + formatTime(video.duration);

        requestAnimationFrame(render);
    }

    function formatTime(seconds) {
        if (isNaN(seconds)) return "00:00";
        const m = Math.floor(seconds / 60);
        const s = Math.floor(seconds % 60);
        return m.toString().padStart(2, '0') + ":" + s.toString().padStart(2, '0');
    }
</script>
</body>
</html>

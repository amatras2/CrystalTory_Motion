<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrystalTory_Motion</title>
    <style>
        :root {
            --bg-color: #0d0d0d; /* 더 깊은 블랙으로 조정 */
            --editor-bg: #161616;
            --text-main: #f0f0f0;
            --accent-color: #d1d1d1; /* 실버 느낌의 턱시도 포인트 */
            --border-color: #2a2a2a;
            --toolbar-bg: #1a1a1a;
            --button-hover: #333333;
            
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .editor-container {
            width: 95%;
            max-width: 1100px;
            height: 85vh;
            background-color: var(--editor-bg);
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        .editor-header {
            padding: 20px 30px;
            border-bottom: 1px solid var(--border-color);
            background: linear-gradient(to right, #1a1a1a, #121212);
        }

        .editor-title {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .toolbar {
            background-color: var(--toolbar-bg);
            padding: 12px 25px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            gap: 10px;
            overflow-x: auto;
        }

        .toolbar button {
            background: #222;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 8px 14px;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.2s;
            white-space: nowrap;
        }

        .toolbar button:hover {
            background-color: var(--button-hover);
            transform: translateY(-1px);
        }

        #editor {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            outline: none;
            line-height: 1.9;
            font-size: 1.15rem;
        }

        /* 스크롤바 커스텀 (턱시도 다크) */
        #editor::-webkit-scrollbar { width: 8px; }
        #editor::-webkit-scrollbar-track { background: var(--editor-bg); }
        #editor::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

        .editor-footer {
            padding: 12px 30px;
            border-top: 1px solid var(--border-color);
            font-size: 0.8rem;
            color: #555;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>

    <div class="editor-container">
        <div class="editor-header">
            <div class="editor-title">💎 CrystalTory_Motion</div>
        </div>

        <div class="toolbar">
            <button onclick="execCmd('bold')"><b>B</b></button>
            <button onclick="execCmd('italic')"><i>I</i></button>
            <button onclick="formatBlock('h1')">제목 1</button>
            <button onclick="formatBlock('h2')">제목 2</button>
            <button onclick="execCmd('insertUnorderedList')">리스트</button>
            <button onclick="insertLink()">링크</button>
            <button onclick="document.getElementById('imageInput').click()">이미지</button>
            <input type="file" id="imageInput" style="display:none;" accept="image/*" onchange="insertImage(this)">
        </div>

        <div id="editor" contenteditable="true">
            <h1>🌊 CrystalTory_Motion 프로젝트 가동</h1>
            <p>수정아빠님, 이곳은 <strong>웨이크보드</strong>와 <strong>테니스</strong>, 그리고 모든 모션을 기록하는 전용 공간입니다.</p>
            <p>수정이가 커가는 모습이나 토리와의 소중한 순간들도 함께 담아보세요.</p>
        </div>

        <div class="editor-footer">
            <span>Version 1.0 (Dark Tuxedo)</span>
            <span>Created for Crystal, Tory & Dad</span>
        </div>
    </div>

    <script>
        function execCmd(command, value = null) {
            document.execCommand(command, false, value);
            document.getElementById('editor').focus();
        }
        function formatBlock(tag) {
            document.execCommand('formatBlock', false, '<' + tag + '>');
        }
        function insertLink() {
            const url = prompt("링크 주소:");
            if (url) execCmd('createLink', url);
        }
        function insertImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    const img = `<img src="${e.target.result}" style="max-width:100%; border-radius:12px; margin:20px 0;">`;
                    document.execCommand('insertHTML', false, img);
                }
                reader.readAsDataURL(input.files[0]);
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CrystalTory_Motion V3.1 (AI + Hybrid Pan)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        :root {
            --tuxedo-black: #0a0a0a;
            --tuxedo-dark: #1a1a1a;
            --tuxedo-white: #f5f5f5;
            --point-silver: #a0a0a0;
            --highlight-green: #bfff00;
            --border: #2d2d2d;
        }

        body {
            background-color: var(--tuxedo-black);
            color: var(--tuxedo-white);
            font-family: 'Pretendard', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            touch-action: none; /* 태블릿 드래그 시 브라우저 스크롤 방지 */
        }

        header {
            padding: 15px 25px;
            background: var(--tuxedo-dark);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo { font-size: 1.2rem; font-weight: 800; }
        .logo span { color: var(--point-silver); }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 15px;
            gap: 15px;
            overflow-y: auto;
        }

        .player-container {
            position: relative;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 16 / 9;
            border: 1px solid var(--border);
            cursor: move; /* 드래그 가능하다는 표시 */
        }

        #motionCanvas { width: 100%; height: 100%; display: block; }

        #loadingStatus {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            padding: 20px;
            border-radius: 10px;
            color: var(--highlight-green);
            display: none;
            z-index: 10;
        }

        .control-panel {
            background: var(--tuxedo-dark);
            padding: 15px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .seek-container { display: flex; align-items: center; gap: 10px; }
        #seekBar { flex: 1; cursor: pointer; accent-color: var(--highlight-green); }

        .zoom-container {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 0.9rem;
            color: var(--point-silver);
        }
        #zoomRange { flex: 1; accent-color: var(--tuxedo-white); }

        .ai-control-bar {
            display: flex;
            gap: 10px;
            background: #111;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }
        .btn-ai {
            flex: 1;
            background: var(--tuxedo-dark);
            color: var(--point-silver);
            border: 1px solid var(--border);
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        .btn-ai.active { background: var(--highlight-green); color: black; font-weight: bold; border-color: var(--highlight-green); }

        .guide-text {
            font-size: 0.8rem;
            color: #666;
            text-align: center;
        }

        footer { padding: 10px; text-align: center; font-size: 0.7rem; color: #333; }
    </style>
</head>
<body>

<header>
    <div class="logo">CRYSTAL TORY <span>MOTION</span></div>
    <div style="font-size: 0.8rem; color: var(--point-silver);">수정아빠의 하이브리드 작업실 🐾</div>
</header>

<main>
    <input type="file" id="videoUpload" accept="video/*">

    <div class="player-container" id="playerContainer">
        <canvas id="motionCanvas"></canvas>
        <div id="loadingStatus">AI 모델 로딩 중...</div>
    </div>

    <p class="guide-text">💡 화면을 손가락으로 밀어서(Drag) 직접 라이더를 따라갈 수 있습니다.</p>

    <div class="control-panel">
        <div class="seek-container">
            <button onclick="togglePlay()" id="playBtn" style="background:none; border:none; color:white; font-size:1.2rem; cursor:pointer;">▶</button>
            <input type="range" id="seekBar" value="0" step="0.1">
            <span id="timeDisplay" style="font-size:0.75rem; min-width:75px;">00:00 / 00:00</span>
        </div>

        <div class="zoom-container">
            <span>ZOOM</span>
            <input type="range" id="zoomRange" min="1" max="8" step="0.1" value="2.0">
            <span id="zoomVal">2.0x</span>
        </div>
    </div>

    <div class="ai-control-bar">
        <button class="btn-ai" id="aiTrackBtn" onclick="toggleAITracking()">AI 추적 모드</button>
        <button class="btn-ai" onclick="resetTracking()">중앙 정렬</button>
    </div>
</main>

<footer>© 2026 CrystalTory_Motion | Created for Crystal, Tory & Dad</footer>

<video id="hiddenVideo" style="display:none;"></video>

<script>
    const video = document.getElementById('hiddenVideo');
    const canvas = document.getElementById('motionCanvas');
    const ctx = canvas.getContext('2d');
    const seekBar = document.getElementById('seekBar');
    const zoomRange = document.getElementById('zoomRange');
    const zoomVal = document.getElementById('zoomVal');
    const videoUpload = document.getElementById('videoUpload');
    const playBtn = document.getElementById('playBtn');
    const loadingStatus = document.getElementById('loadingStatus');
    const aiTrackBtn = document.getElementById('aiTrackBtn');
    const playerContainer = document.getElementById('playerContainer');

    let model = null;
    let isAITracking = false;
    let isDetecting = false;
    let aiStatusText = "대기";
    let zoom = 2.0;
    
    // 위치 제어 변수들
    let currentCenterX = 0;
    let currentCenterY = 0;
    let targetCenterX = 0;
    let targetCenterY = 0;
    const smoothingFactor = 0.15; // 반응속도를 위해 살짝 높임

    // 🖐️ 수동 드래그 관련 변수
    let isDragging = false;
    let lastMouseX = 0;
    let lastMouseY = 0;

    // AI 모델 로딩
    async function loadModel() {
        loadingStatus.style.display = 'block';
        model = await cocoSsd.load();
        loadingStatus.style.display = 'none';
    }
    loadModel();

    videoUpload.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            video.src = URL.createObjectURL(file);
            video.onloadedmetadata = () => {
                seekBar.max = video.duration;
                currentCenterX = targetCenterX = video.videoWidth / 2;
                currentCenterY = targetCenterY = video.videoHeight / 2;
                render();
            };
        }
    });

    // 🖐️ 수동 드래그(Pan) 로직 추가
    playerContainer.addEventListener('mousedown', startDrag);
    playerContainer.addEventListener('mousemove', drag);
    window.addEventListener('mouseup', endDrag);

    playerContainer.addEventListener('touchstart', (e) => startDrag(e.touches[0]), {passive: false});
    playerContainer.addEventListener('touchmove', (e) => {
        e.preventDefault(); // 스크롤 방지
        drag(e.touches[0]);
    }, {passive: false});
    window.addEventListener('touchend', endDrag);

    function startDrag(e) {
        isDragging = true;
        isAITracking = false; // 드래그 시작하면 AI 추적은 잠시 꺼줌 (수동 우선)
        aiTrackBtn.classList.remove('active');
        lastMouseX = e.clientX;
        lastMouseY = e.clientY;
    }

    function drag(e) {
        if (!isDragging) return;
        
        // 마우스 이동 거리 계산
        const dx = e.clientX - lastMouseX;
        const dy = e.clientY - lastMouseY;

        // 캔버스 크기와 영상 원본 크기 비율에 맞춰 이동 거리 보정
        const scale = video.videoWidth / playerContainer.offsetWidth / zoom;
        
        targetCenterX -= dx * scale;
        targetCenterY -= dy * scale;

        lastMouseX = e.clientX;
        lastMouseY = e.clientY;
    }

    function endDrag() { isDragging = false; }

    function togglePlay() {
        if (video.paused) { video.play(); playBtn.innerText = "Ⅱ"; }
        else { video.pause(); playBtn.innerText = "▶"; }
    }

    seekBar.addEventListener('input', () => { video.currentTime = seekBar.value; });
    zoomRange.addEventListener('input', (e) => { zoom = e.target.value; zoomVal.innerText = zoom + 'x'; });

    function toggleAITracking() {
        if (!model) return;
        isAITracking = !isAITracking;
        isAITracking ? aiTrackBtn.classList.add('active') : aiTrackBtn.classList.remove('active');
    }

    function resetTracking() {
        isAITracking = false;
        aiTrackBtn.classList.remove('active');
        targetCenterX = video.videoWidth / 2;
        targetCenterY = video.videoHeight / 2;
    }

    async function detectFrame() {
        if (!isAITracking || video.paused || isDetecting) return;
        isDetecting = true;

        try {
            const predictions = await model.detect(video);
            // 보트(boat)보다는 사람(person)에게 훨씬 높은 가중치를 줌
            const target = predictions.filter(p => p.class === 'person' && p.score > 0.4) // 사람 우선 탐색
                                      .sort((a, b) => b.score - a.score)[0] 
                           || predictions.filter(p => ['surfboard', 'boat'].includes(p.class)) // 없으면 보트라도
                                      .sort((a, b) => b.score - a.score)[0];

            if (target) {
                const [x, y, width, height] = target.bbox;
                targetCenterX = x + width / 2;
                targetCenterY = y + height / 2;
                aiStatusText = `🎯 ${target.class}`;
            } else {
                aiStatusText = `👀 찾는 중...`;
            }
        } catch (e) {} finally { isDetecting = false; }
    }

    function render() {
        if (video.videoWidth === 0) { requestAnimationFrame(render); return; }

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        if (isAITracking) { detectFrame(); }

        // 스무딩 (자연스러운 이동)
        currentCenterX += (targetCenterX - currentCenterX) * smoothingFactor;
        currentCenterY += (targetCenterY - currentCenterY) * smoothingFactor;

        // 경계선 보정
        const sw = canvas.width / zoom;
        const sh = canvas.height / zoom;
        currentCenterX = Math.max(sw/2, Math.min(canvas.width - sw/2, currentCenterX));
        currentCenterY = Math.max(sh/2, Math.min(canvas.height - sh/2, currentCenterY));

        const sx = currentCenterX - sw / 2;
        const sy = currentCenterY - sh / 2;

        ctx.drawImage(video, sx, sy, sw, sh, 0, 0, canvas.width, canvas.height);
        
        // 상태 표시
        if (isAITracking) {
            ctx.fillStyle = "rgba(0,0,0,0.6)"; ctx.fillRect(20, 20, 120, 30);
            ctx.fillStyle = "#bfff00"; ctx.font = "14px Pretendard"; ctx.fillText(aiStatusText, 35, 40);
        }

        if (!video.paused) { seekBar.value = video.currentTime; }
        document.getElementById('timeDisplay').innerText = formatTime(video.currentTime) + " / " + formatTime(video.duration);
        requestAnimationFrame(render);
    }

    function formatTime(seconds) {
        if (isNaN(seconds)) return "00:00";
        const m = Math.floor(seconds / 60); const s = Math.floor(seconds % 60);
        return m.toString().padStart(2, '0') + ":" + s.toString().padStart(2, '0');
    }
</script>
</body>
</html>

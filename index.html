<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToryTennis Editor V3.0 - Tuxedo Dark Edition</title>
    <style>
        /* --- Core Vibe: Tuxedo Dark Theme --- */
        :root {
            --bg-color: #121212; /* Deep background (Black portion of Tuxedo) */
            --editor-bg: #1e1e1e; /* Slightly lighter for the area (Soft shade) */
            --text-main: #e0e0e0; /* Soft white (White portion of Tuxedo) */
            --accent-color: #bb86fc; /* Accent: Soft Purple (A touch of elegance) */
            --border-color: #333333;
            --toolbar-bg: #1a1a1a;
            --button-hover: #2d2d2d;
            
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* --- Container & Layout --- */
        .editor-container {
            width: 90%;
            max-width: 1000px;
            height: 80vh;
            background-color: var(--editor-bg);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        /* --- Header: App Title --- */
        .editor-header {
            padding: 15px 25px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .editor-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        /* Little cat icon concept */
        .editor-title::before {
            content: '🐾'; 
            font-size: 1.4rem;
        }

        /* --- Toolbar --- */
        .toolbar {
            background-color: var(--toolbar-bg);
            padding: 10px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .toolbar button {
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-main);
            padding: 8px 12px;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s ease;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .toolbar button:hover {
            background-color: var(--button-hover);
            border-color: var(--border-color);
        }

        .toolbar button.active {
            background-color: var(--accent-color);
            color: #000;
        }
        
        .separator {
            width: 1px;
            height: 24px;
            background-color: var(--border-color);
            margin: 0 4px;
            align-self: center;
        }

        /* --- Editable Area --- */
        #editor {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            outline: none;
            line-height: 1.8;
            font-size: 1.1rem;
            color: var(--text-main);
        }

        #editor:empty:before {
            content: attr(placeholder);
            color: #555;
            font-style: italic;
        }
        
        /* Styling for specific elements inside editor */
        #editor h1 { font-size: 2rem; border-bottom: 2px solid var(--accent-color); padding-bottom: 10px; margin-bottom: 20px;}
        #editor h2 { font-size: 1.5rem; margin-top: 1.5em;}
        #editor p { margin-bottom: 1em; }
        #editor blockquote { border-left: 4px solid var(--accent-color); padding-left: 20px; color: #aaa; margin: 1.5em 0; }

        /* --- Footer --- */
        .editor-footer {
            padding: 10px 25px;
            border-top: 1px solid var(--border-color);
            font-size: 0.85rem;
            color: #666;
            text-align: right;
        }
    </style>
</head>
<body>

    <div class="editor-container">
        <div class="editor-header">
            <div class="editor-title">ToryTennis Editor V3.0</div>
        </div>

        <div class="toolbar">
            <button onclick="execCmd('bold')" title="Bold (Ctrl+B)"><b>B</b></button>
            <button onclick="execCmd('italic')" title="Italic (Ctrl+I)"><i>I</i></button>
            <button onclick="execCmd('underline')" title="Underline (Ctrl+U)"><u>U</u></button>
            <button onclick="execCmd('strikeThrough')" title="Strikethrough"><s>S</s></button>
            
            <div class="separator"></div>
            
            <button onclick="formatBlock('h1')" title="Heading 1">H1</button>
            <button onclick="formatBlock('h2')" title="Heading 2">H2</button>
            <button onclick="formatBlock('p')" title="Paragraph">P</button>
            <button onclick="formatBlock('blockquote')" title="Quote">“”</button>
            
            <div class="separator"></div>

            <button onclick="execCmd('insertUnorderedList')" title="Bullet List">• List</button>
            <button onclick="execCmd('insertOrderedList')" title="Numbered List">1. List</button>
            
            <div class="separator"></div>
            
            <button onclick="insertLink()" title="Insert Link">🔗</button>
            <button onclick="document.getElementById('imageInput').click()" title="Insert Image">🖼️</button>
            <input type="file" id="imageInput" style="display:none;" accept="image/*" onchange="insertImage(this)">
        </div>

        <div id="editor" contenteditable="true" placeholder="토리테니스 예약 일지나 아이디어를 자유롭게 적어보세요...">
            <h1>🎾 ToryTennis V3.0 에디터에 오신 것을 환영합니다!</h1>
            <p>파트너님, 차분하고 고급스러운 턱시도 고양이 풍의 다크 모드로 구성해 보았습니다. 어떠신가요?</p>
            <blockquote>이곳에 테니스 전술이나 예약 자동화 스크립트 아이디어, 혹은 귀여운 토리의 사진을 담아보세요.</blockquote>
            <p>자유롭게 수정하고 테스트해 보세요.</p>
        </div>

        <div class="editor-footer">
            Inspired by Tory, Crafted by Partner.
        </div>
    </div>

    <script>
        // Core function to execute built-in command
        function execCmd(command, value = null) {
            document.execCommand(command, false, value);
            document.getElementById('editor').focus(); // Keep focus
        }

        // Specifically handle block formatting like H1, P, etc.
        function formatBlock(tag) {
            document.execCommand('formatBlock', false, '<' + tag + '>');
            document.getElementById('editor').focus();
        }

        // Function to insert a link
        function insertLink() {
            const url = prompt("링크 주소를 입력하세요 (e.g., https://torytennis.com):");
            if (url) {
                execCmd('createLink', url);
            }
        }
        
        // Function to insert and display an image
        function insertImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                
                reader.onload = function(e) {
                    // Optimized for UX: Insert image where the cursor is
                    const imgHtml = `<img src="${e.target.result}" style="max-width: 100%; border-radius: 8px; margin: 10px 0;" alt="Uploaded Image">`;
                    document.execCommand('insertHTML', false, imgHtml);
                }
                
                reader.readAsDataURL(input.files[0]);
                // Reset input to allow uploading the same image again if needed
                input.value = ''; 
            }
        }

        // Basic Keyboard Shortcuts (e.g., Ctrl+B) are already handled by contenteditable
        // Let's add simple visual feedback for active styles if needed (optional refinement)
    </script>
</body>
</html>

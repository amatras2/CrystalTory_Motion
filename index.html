<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CrystalTory_Motion V5.7 (Highlight Edition)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        :root {
            --tuxedo-black: #0a0a0a; --tuxedo-dark: #1a1a1a;
            --tuxedo-white: #f5f5f5; --point-silver: #a0a0a0;
            --highlight-green: #bfff00; --highlight-blue: #00d2ff; --highlight-red: #ff4757; --border: #2d2d2d;
        }

        body {
            background-color: var(--tuxedo-black); color: var(--tuxedo-white);
            font-family: 'Pretendard', sans-serif; margin: 0;
            display: flex; flex-direction: column; min-height: 100vh;
        }

        header {
            padding: 15px 25px; background: var(--tuxedo-dark); border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 50;
        }
        .logo { font-size: 1.2rem; font-weight: 800; }
        .logo span { color: var(--point-silver); font-weight: 300; }
        .status-badge { font-size: 0.75rem; padding: 4px 8px; border-radius: 4px; background: #333; color: #aaa; transition: 0.3s; font-weight: bold; }

        main { display: flex; flex-direction: column; padding: 15px; gap: 15px; flex: 1; }

        .file-ops { display: flex; gap: 10px; }
        .file-btn { 
            flex: 1; background: #222; border: 1px solid #444; color: #ddd; 
            padding: 10px; border-radius: 8px; text-align: center; font-size: 0.85rem; cursor: pointer; transition: 0.2s;
        }
        .file-btn:hover { background: #333; }
        .hidden-input { display: none; }

        .player-container {
            position: relative; background: #000; border-radius: 12px;
            overflow: hidden; aspect-ratio: 16 / 9; border: 1px solid var(--border);
            cursor: grab; width: 100%; transition: border-color 0.2s;
        }
        .player-container:active { cursor: grabbing; }
        #motionCanvas { width: 100%; height: 100%; display: block; touch-action: none; }
        
        .playback-controls { display: flex; justify-content: center; gap: 20px; align-items: center; margin-top: 5px; }
        .skip-btn { background: #222; border: 1px solid #444; color: #ddd; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; }

        .sliders-group {
            display: flex; flex-direction: column; gap: 12px; 
            background: #111; padding: 12px; border-radius: 8px; border: 1px solid var(--border);
        }
        .slider-row { display: flex; align-items: center; gap: 15px; font-size: 0.85rem; color: var(--point-silver); }
        .slider-row label { min-width: 65px; font-weight: bold; }
        input[type=range] { flex: 1; accent-color: var(--highlight-green); cursor: pointer; }
        .val-display { min-width: 40px; text-align: right; color: var(--highlight-green); font-weight: bold; }

        .auto-zoom-btn {
            background: #333; color: white; border: 1px solid #555; padding: 4px 8px;
            border-radius: 4px; font-size: 0.7rem; cursor: pointer; transition: 0.2s;
        }
        .auto-zoom-btn.active { background: #002200; color: var(--highlight-green); border-color: var(--highlight-green); }

        .timeline-editor {
            background: var(--tuxedo-dark); border-radius: 12px; border: 1px solid var(--border);
            display: flex; flex-direction: column; min-height: 250px;
        }
        .timeline-header { padding: 12px 15px; border-bottom: 1px solid var(--border); font-size: 0.85rem; font-weight: bold; color: var(--point-silver); display: flex; justify-content: space-between; align-items: center; }
        
        .segment-list { padding: 10px; display: flex; flex-direction: column; gap: 8px; }
        .segment-item { 
            display: flex; flex-direction: column; gap: 10px; background: #111; 
            padding: 12px; border-radius: 8px; border: 1px solid #222;
        }
        .segment-label-select { 
            background: #222; color: white; border: 1px solid #444; padding: 6px; 
            border-radius: 4px; font-size: 0.8rem; flex: 1; font-weight: bold;
        }
        .segment-label-select.jump { color: var(--highlight-red); border-color: var(--highlight-red); }
        .segment-label-select.slalom { color: var(--highlight-blue); border-color: var(--highlight-blue); }

        /* V5.7 추가된 버튼 스타일 */
        .action-icon-btn {
            background: #333; border: 1px solid #555; color: white; padding: 6px 10px; 
            border-radius: 4px; cursor: pointer; font-size: 0.75rem; transition: 0.2s; font-weight: bold;
        }
        .action-icon-btn:hover { background: #444; }
        .action-icon-btn.recording { background: var(--highlight-red); border-color: var(--highlight-red); animation: pulse 1.5s infinite; }
        
        .time-ctrl { display: flex; align-items: center; gap: 5px; background: #222; padding: 4px 8px; border-radius: 6px; border: 1px solid #333;}
        .time-btn { background: transparent; border: none; color: var(--point-silver); cursor: pointer; font-weight: bold; font-size: 1rem; padding: 0 4px; }
        .time-btn:hover { color: white; }

        .control-panel { background: var(--tuxedo-dark); padding: 15px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px;}
        .btn-group { display: flex; gap: 10px; }
        .action-btn { flex: 1; background: #222; color: white; border: 1px solid #444; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.85rem; }
        .btn-primary { border-color: var(--highlight-blue); color: var(--highlight-blue); }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<header>
    <div class="logo">CrystalTory <span>Motion</span></div>
    <div style="display: flex; gap: 10px; align-items: center;">
        <span id="aiStatus" class="status-badge">🧠 대기중...</span>
        <div style="font-size: 0.8rem; color: var(--point-silver);">V5.7 🐾</div>
    </div>
</header>

<main>
    <div class="file-ops">
        <label class="file-btn">🎬 1. 영상 열기<input type="file" id="videoUpload" accept="video/*" class="hidden-input"></label>
        <label class="file-btn" style="border-color: var(--highlight-blue); color: var(--highlight-blue);">📁 2. 작업 열기<input type="file" id="jsonUpload" accept=".json" class="hidden-input"></label>
    </div>

    <div class="player-container" id="playerContainer">
        <canvas id="motionCanvas"></canvas>
    </div>

    <div class="playback-controls">
        <button class="skip-btn" onclick="skip(-10)">-10초</button>
        <button onclick="togglePlay()" id="playBtn" style="background:none; border:none; color:white; font-size:2.2rem; cursor:pointer; width: 50px;">▶</button>
        <button class="skip-btn" onclick="skip(10)">+10초</button>
    </div>
    
    <div style="display: flex; gap: 10px; align-items: center; margin-top: 5px;">
        <input type="range" id="seekBar" value="0" step="0.1" style="flex: 1;">
        <span id="timeDisplay" style="font-size:0.75rem; min-width:80px; text-align:right;">00:00 / 00:00</span>
    </div>

    <div class="sliders-group">
        <div class="slider-row">
            <label>줌 배율</label>
            <input type="range" id="zoomRange" min="1" max="8" step="0.1" value="2.5">
            <span class="val-display" id="zoomVal">2.5x</span>
            <button id="btnAutoZoom" class="auto-zoom-btn" onclick="toggleAutoZoom()">오토줌 OFF</button>
        </div>
        <div class="slider-row">
            <label>수동 감도</label>
            <input type="range" id="panRange" min="1" max="5" step="0.5" value="2.5">
            <span class="val-display" id="panVal">2.5x</span>
        </div>
    </div>

    <div class="timeline-editor">
        <div class="timeline-header">
            <span>🎥 스마트 분석 타임라인</span>
            <button onclick="autoGenerateSegments()" style="background:none; border:none; color:var(--highlight-green); font-size:0.8rem; cursor:pointer; font-weight:bold;">✨ 스마트 구간 분석</button>
        </div>
        <div class="segment-list" id="segmentList"></div>
    </div>

    <div class="control-panel">
        <div class="btn-group">
            <button class="action-btn" onclick="resetCenter()">🎯 중앙 초기화</button>
            <button class="action-btn btn-primary" onclick="exportData()">💾 최종 데이터 저장</button>
        </div>
    </div>
</main>

<video id="hiddenVideo" style="display:none;" playsinline muted></video>

<script>
    const video = document.getElementById('hiddenVideo');
    const canvas = document.getElementById('motionCanvas');
    const ctx = canvas.getContext('2d');
    const seekBar = document.getElementById('seekBar');
    const zoomRange = document.getElementById('zoomRange');
    const zoomVal = document.getElementById('zoomVal');
    const panRange = document.getElementById('panRange');
    const panVal = document.getElementById('panVal');
    const videoUpload = document.getElementById('videoUpload');
    const jsonUpload = document.getElementById('jsonUpload');
    const playBtn = document.getElementById('playBtn');
    const playerContainer = document.getElementById('playerContainer');
    const aiStatus = document.getElementById('aiStatus');
    const segmentListUI = document.getElementById('segmentList');
    const btnAutoZoom = document.getElementById('btnAutoZoom');

    let currentZoom = 2.5; let targetZoom = 2.5;  
    let isAutoZoom = false; let panSensitivity = 2.5; 
    let centerX = 0; let centerY = 0;
    let targetX = 0; let targetY = 0;
    
    let isDragging = false;
    let lastMouseX = 0; let lastMouseY = 0;

    let trackData = []; let segments = [];
    let model = null; let isDetecting = false; let targetLostFrames = 0; 
    
    // V5.7 전용 녹화 상태 변수
    let activeSegmentListener = null;
    let mediaRecorder = null;
    let recordedChunks = [];
    let isRecording = false;

    const MOTION_TAGS = ['기본 트래킹', '스타트', '슬라럼', '웨이크 진입', '점프', '에어 타임', '랜딩', '피니시', '대기/이탈'];

    cocoSsd.load().then(m => { 
        model = m; 
        aiStatus.innerText = "🟢 AI 준비 완료"; 
        aiStatus.style.color = "var(--highlight-green)";
    });

    videoUpload.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            video.src = URL.createObjectURL(file);
            video.onloadedmetadata = () => {
                seekBar.max = video.duration;
                centerX = video.videoWidth / 2; centerY = video.videoHeight / 2;
                targetX = centerX; targetY = centerY;
                trackData = []; render();
            };
        }
    });

    jsonUpload.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            try {
                const data = JSON.parse(event.target.result);
                if (data.segments) { segments = data.segments; updateSegmentListUI(); }
                if (data.trackData) { trackData = data.trackData; }
                alert("✅ 데이터를 성공적으로 불러왔습니다!");
            } catch(err) { alert("❌ 오류가 발생했습니다."); }
        };
        reader.readAsText(file);
    });

    function skip(amount) { if(!isNaN(video.duration)) video.currentTime = Math.max(0, Math.min(video.duration, video.currentTime + amount)); }

    function toggleAutoZoom() {
        isAutoZoom = !isAutoZoom;
        if (isAutoZoom) {
            btnAutoZoom.classList.add('active'); btnAutoZoom.innerText = "✨ 오토줌 ON";
        } else {
            btnAutoZoom.classList.remove('active'); btnAutoZoom.innerText = "오토줌 OFF";
            targetZoom = currentZoom; 
        }
    }

    zoomRange.addEventListener('input', (e) => { 
        if(isAutoZoom) toggleAutoZoom(); 
        targetZoom = parseFloat(e.target.value); currentZoom = targetZoom;
        zoomVal.innerText = targetZoom.toFixed(1) + 'x'; 
    });
    panRange.addEventListener('input', (e) => { panSensitivity = parseFloat(e.target.value); panVal.innerText = panSensitivity.toFixed(1) + 'x'; });

    function startDrag(e) { 
        isDragging = true; 
        lastMouseX = e.clientX || (e.touches && e.touches[0].clientX); 
        lastMouseY = e.clientY || (e.touches && e.touches[0].clientY); 
        playerContainer.style.borderColor = "var(--highlight-blue)";
    }
    function drag(e) {
        if (!isDragging) return;
        const clientX = e.clientX || (e.touches && e.touches[0].clientX);
        const clientY = e.clientY || (e.touches && e.touches[0].clientY);
        const dx = clientX - lastMouseX; const dy = clientY - lastMouseY;
        const scale = ((video.videoWidth / currentZoom) / playerContainer.offsetWidth) * panSensitivity;
        centerX -= dx * scale; centerY -= dy * scale;
        targetX = centerX; targetY = centerY;
        lastMouseX = clientX; lastMouseY = clientY;
    }
    function endDrag() { isDragging = false; playerContainer.style.borderColor = "var(--border)"; }
    
    playerContainer.addEventListener('mousedown', startDrag); window.addEventListener('mousemove', drag); window.addEventListener('mouseup', endDrag);
    playerContainer.addEventListener('touchstart', startDrag, {passive: false}); window.addEventListener('touchmove', (e) => { if(isDragging) { e.preventDefault(); drag(e.touches[0]); } }, {passive: false}); window.addEventListener('touchend', endDrag);

    async function detectPerson() {
        if (!model || video.paused || isDetecting || isDragging) return;
        isDetecting = true;
        try {
            const predictions = await model.detect(canvas); 
            const person = predictions.find(p => p.class === 'person');
            
            if (person) {
                targetLostFrames = 0; 
                const bx = person.bbox[0] + person.bbox[2]/2;
                const by = person.bbox[1] + person.bbox[3]/2;
                const viewW = canvas.width / currentZoom; 
                const viewH = canvas.height / currentZoom;
                targetX = (centerX - viewW/2) + (bx / canvas.width) * viewW;
                targetY = (centerY - viewH/2) + (by / canvas.height) * viewH;
                
                if (isAutoZoom) {
                    const personHeightOnCanvas = person.bbox[3]; 
                    const desiredHeight = canvas.height * 0.45;  
                    let calculatedZoom = currentZoom * (desiredHeight / personHeightOnCanvas);
                    targetZoom = Math.max(1.0, Math.min(calculatedZoom, 8.0));
                }
                if(!isRecording) { aiStatus.style.color = "var(--highlight-green)"; aiStatus.innerText = "🎯 추적 중"; }
            } else {
                targetLostFrames++;
                if (targetLostFrames >= 2) {
                    const fallbackPreds = await model.detect(video);
                    const fbPerson = fallbackPreds.find(p => p.class === 'person');
                    if (fbPerson) {
                        targetX = fbPerson.bbox[0] + fbPerson.bbox[2]/2;
                        targetY = fbPerson.bbox[1] + fbPerson.bbox[3]/2;
                        targetLostFrames = 0;
                    } else {
                        targetX = centerX; targetY = centerY;
                        if (isAutoZoom) targetZoom = 1.0; 
                    }
                }
            }
        } finally { isDetecting = false; }
    }

    function autoGenerateSegments() {
        if (trackData.length < 50) { alert("데이터가 부족합니다!"); return; }
        let tempSegments = []; let windowSize = 3; 
        let lastTime = parseFloat(trackData[trackData.length-1].t);
        const w = video.videoWidth; const h = video.videoHeight;

        for (let startT = 0; startT < lastTime; startT += windowSize) {
            let chunk = trackData.filter(d => parseFloat(d.t) >= startT && parseFloat(d.t) < startT + windowSize);
            if (chunk.length === 0) continue;
            let xs = chunk.map(d => parseFloat(d.x)); let ys = chunk.map(d => parseFloat(d.y)); let zs = chunk.map(d => parseFloat(d.z));
            let diffX = Math.max(...xs) - Math.min(...xs); let diffY = Math.max(...ys) - Math.min(...ys);
            let avgZ = zs.reduce((a, b) => a + b, 0) / zs.length;
            let label = '기본 트래킹';
            if (avgZ <= 1.2) label = '대기/이탈';
            else if (diffY > h * 0.15) label = '점프';
            else if (diffX > w * 0.20) label = '슬라럼';
            tempSegments.push({ start: startT, end: startT + windowSize, label: label });
        }
        segments = [];
        if (tempSegments.length > 0) {
            let curr = tempSegments[0];
            for (let i = 1; i < tempSegments.length; i++) {
                if (tempSegments[i].label === curr.label) curr.end = tempSegments[i].end;
                else { segments.push(curr); curr = tempSegments[i]; }
            }
            segments.push(curr);
            segments = segments.map((m, idx) => ({ id: Date.now() + idx, start: m.start, end: m.end, label: m.label }));
        }
        updateSegmentListUI();
    }

    // V5.7 UI 업데이트 (재생/추출/시간조절 추가)
    function updateSegmentListUI() {
        segmentListUI.innerHTML = '';
        segments.forEach(seg => {
            const item = document.createElement('div');
            item.className = 'segment-item';
            let c = seg.label === '점프' ? 'jump' : seg.label === '슬라럼' ? 'slalom' : '';
            item.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center; gap: 10px;">
                    <select class="segment-label-select ${c}" onchange="updateSegmentLabel(${seg.id}, this)">
                        ${MOTION_TAGS.map(tag => `<option value="${tag}" ${seg.label === tag ? 'selected' : ''}>${tag}</option>`).join('')}
                    </select>
                    <div style="display:flex; gap:6px;">
                        <button class="action-icon-btn" onclick="playSegment(${seg.id})">▶ 재생</button>
                        <button class="action-icon-btn" onclick="extractHighlight(${seg.id}, this)">🎬 추출</button>
                        <button class="action-icon-btn" style="background:transparent; border:none; color:var(--highlight-red); padding: 0 5px;" onclick="deleteSegment(${seg.id})">✕</button>
                    </div>
                </div>
                <div style="display:flex; justify-content:space-between; align-items:center; font-size:0.8rem;">
                    <div class="time-ctrl">
                        <button class="time-btn" onclick="adjustSegmentTime(${seg.id}, 'start', -0.5)">-</button>
                        <span style="color:var(--highlight-green); min-width:40px; text-align:center;">${formatTime(seg.start)}</span>
                        <button class="time-btn" onclick="adjustSegmentTime(${seg.id}, 'start', 0.5)">+</button>
                    </div>
                    <span style="color:#555;">~</span>
                    <div class="time-ctrl">
                        <button class="time-btn" onclick="adjustSegmentTime(${seg.id}, 'end', -0.5)">-</button>
                        <span style="color:var(--highlight-green); min-width:40px; text-align:center;">${formatTime(seg.end)}</span>
                        <button class="time-btn" onclick="adjustSegmentTime(${seg.id}, 'end', 0.5)">+</button>
                    </div>
                </div>
            `;
            segmentListUI.appendChild(item);
        });
    }

    function updateSegmentLabel(id, el) { 
        const s = segments.find(i => i.id === id); 
        if (s) { s.label = el.value; el.className = 'segment-label-select ' + (s.label === '점프' ? 'jump' : s.label === '슬라럼' ? 'slalom' : ''); }
    }
    function deleteSegment(id) { segments = segments.filter(s => s.id !== id); updateSegmentListUI(); }

    // V5.7 시간 미세조정 로직
    function adjustSegmentTime(id, field, delta) {
        const seg = segments.find(s => s.id === id);
        if (!seg) return;
        seg[field] = Math.max(0, Math.min(video.duration || 9999, seg[field] + delta));
        
        // 시작 시간이 종료 시간을 넘지 않도록 방어 로직
        if (seg.start >= seg.end) {
            if (field === 'start') seg.end = seg.start + 0.5;
            else seg.start = Math.max(0, seg.end - 0.5);
        }
        updateSegmentListUI();
    }

    // V5.7 구간 재생 로직
    function playSegment(id) {
        if(isRecording) return alert("현재 영상을 렌더링 중입니다. 잠시만 기다려주세요!");
        const seg = segments.find(s => s.id === id);
        if(!seg) return;

        video.currentTime = seg.start;
        video.play();
        playBtn.innerText = "Ⅱ";

        if(activeSegmentListener) video.removeEventListener('timeupdate', activeSegmentListener);
        activeSegmentListener = () => {
            if(video.currentTime >= seg.end) {
                video.pause();
                playBtn.innerText = "▶";
                video.removeEventListener('timeupdate', activeSegmentListener);
                activeSegmentListener = null;
            }
        };
        video.addEventListener('timeupdate', activeSegmentListener);
    }

    // V5.7 캔버스 화면 렌더링(녹화) 추출 로직
    async function extractHighlight(id, btnElement) {
        if(isRecording) return alert("이미 다른 영상을 렌더링 중입니다!");
        const seg = segments.find(s => s.id === id);
        if(!seg) return;

        isRecording = true;
        btnElement.classList.add('recording');
        btnElement.innerText = "🔴 녹화중...";
        aiStatus.style.color = "var(--highlight-red)"; 
        aiStatus.innerText = "🔴 렌더링 진행 중";
        
        video.currentTime = seg.start;
        await new Promise(r => video.addEventListener('seeked', r, {once: true}));
        
        // 캔버스의 화면을 30FPS로 스트리밍 캡처
        const stream = canvas.captureStream(30); 
        mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
        recordedChunks = [];
        
        mediaRecorder.ondataavailable = e => { if(e.data.size > 0) recordedChunks.push(e.data); };
        mediaRecorder.onstop = () => {
            const blob = new Blob(recordedChunks, { type: 'video/webm' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `ToryMotion_${seg.label}_${Date.now()}.webm`;
            a.click();
            URL.revokeObjectURL(url);
            
            isRecording = false;
            btnElement.classList.remove('recording');
            btnElement.innerText = "🎬 추출";
            aiStatus.style.color = "var(--highlight-green)"; 
            aiStatus.innerText = "🟢 AI 준비 완료";
            alert("✅ 하이라이트 영상 추출이 완료되었습니다!");
        };

        mediaRecorder.start();
        video.play();
        playBtn.innerText = "Ⅱ";

        if(activeSegmentListener) video.removeEventListener('timeupdate', activeSegmentListener);
        activeSegmentListener = () => {
            if(video.currentTime >= seg.end) {
                video.pause();
                playBtn.innerText = "▶";
                mediaRecorder.stop();
                video.removeEventListener('timeupdate', activeSegmentListener);
                activeSegmentListener = null;
            }
        };
        video.addEventListener('timeupdate', activeSegmentListener);
    }

    function render() {
        if (video.videoWidth === 0) { requestAnimationFrame(render); return; }
        if (!video.paused && !isDragging) detectPerson();
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        if (!isDragging) {
            centerX += (targetX - centerX) * 0.15; centerY += (targetY - centerY) * 0.15;
            currentZoom += (targetZoom - currentZoom) * 0.05; 
            zoomRange.value = currentZoom; zoomVal.innerText = currentZoom.toFixed(1) + 'x';
        }
        const vW = canvas.width / currentZoom; const vH = canvas.height / currentZoom;
        centerX = Math.max(vW / 2, Math.min(canvas.width - vW / 2, centerX));
        centerY = Math.max(vH / 2, Math.min(canvas.height - vH / 2, centerY));
        ctx.drawImage(video, centerX - vW/2, centerY - vH/2, vW, vH, 0, 0, canvas.width, canvas.height);
        if (!video.paused) {
            seekBar.value = video.currentTime;
            if (Math.floor(video.currentTime * 10) % 2 === 0) trackData.push({t: video.currentTime.toFixed(2), x: centerX.toFixed(1), y: centerY.toFixed(1), z: currentZoom.toFixed(1)});
        }
        document.getElementById('timeDisplay').innerText = formatTime(video.currentTime) + " / " + formatTime(video.duration);
        requestAnimationFrame(render);
    }

    function exportData() {
        const data = { projectName: "CrystalTory_V5.7", segments, trackData };
        const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `motion_edit_${Date.now()}.json`; a.click();
    }

    function togglePlay() { video.paused ? (video.play(), playBtn.innerText = "Ⅱ") : (video.pause(), playBtn.innerText = "▶"); }
    function resetCenter() { targetX = video.videoWidth / 2; targetY = video.videoHeight / 2; targetZoom = 2.5; isAutoZoom = false; btnAutoZoom.className = "auto-zoom-btn"; btnAutoZoom.innerText = "오토줌 OFF";}
    function formatTime(s) { 
        if (isNaN(s)) return "00:00";
        const m = Math.floor(s / 60); const sec = Math.floor(s % 60);
        return m.toString().padStart(2, '0') + ":" + sec.toString().padStart(2, '0'); 
    }
    seekBar.addEventListener('input', () => { if(!isNaN(video.duration)) video.currentTime = seekBar.value; });
</script>
</body>

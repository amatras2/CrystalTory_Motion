<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CrystalTory_Motion V4.8 (Export & Tagging)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        :root {
            --tuxedo-black: #0a0a0a; --tuxedo-dark: #1a1a1a;
            --tuxedo-white: #f5f5f5; --point-silver: #a0a0a0;
            --highlight-green: #bfff00; --highlight-blue: #00d2ff; --highlight-red: #ff4757; --border: #2d2d2d;
        }

        body {
            background-color: var(--tuxedo-black); color: var(--tuxedo-white);
            font-family: 'Pretendard', sans-serif; margin: 0;
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
            touch-action: none;
        }

        header {
            padding: 15px 25px; background: var(--tuxedo-dark); border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo { font-size: 1.2rem; font-weight: 800; }
        .logo span { color: var(--point-silver); font-weight: 300; }
        .status-badge { font-size: 0.75rem; padding: 4px 8px; border-radius: 4px; background: #333; color: #aaa; }

        main { flex: 1; display: flex; flex-direction: column; padding: 15px; gap: 10px; overflow-y: auto; }

        .player-container {
            position: relative; background: #000; border-radius: 12px;
            overflow: hidden; aspect-ratio: 16 / 9; border: 1px solid var(--border);
            cursor: grab; flex-shrink: 0;
        }
        .player-container:active { cursor: grabbing; }

        #motionCanvas { width: 100%; height: 100%; display: block; touch-action: none; }
        
        .crosshair {
            position: absolute; top: 50%; left: 50%; width: 30px; height: 30px;
            border: 2px solid rgba(191, 255, 0, 0.4); transform: translate(-50%, -50%);
            pointer-events: none; border-radius: 50%;
        }

        /* 하단 태그 패널 */
        .tags-container { display: flex; gap: 8px; overflow-x: auto; padding: 5px 0; scrollbar-width: none; }
        .tag-btn { 
            background: #222; color: #ddd; border: 1px solid #444; padding: 8px 15px; 
            border-radius: 6px; font-size: 0.85rem; cursor: pointer; white-space: nowrap; transition: 0.2s;
        }
        .tag-btn:active { background: var(--highlight-green); color: black; }

        .control-panel { background: var(--tuxedo-dark); padding: 15px; border-radius: 12px; display: flex; flex-direction: column; gap: 10px; flex-shrink: 0;}
        .seek-container { display: flex; align-items: center; gap: 10px; }
        #seekBar { flex: 1; cursor: pointer; accent-color: var(--highlight-green); }
        
        .sliders-group {
            display: flex; flex-direction: column; gap: 10px; 
            background: #111; padding: 12px; border-radius: 8px; border: 1px solid var(--border);
        }
        .slider-row { display: flex; align-items: center; gap: 15px; font-size: 0.85rem; color: var(--point-silver); }
        .slider-row label { min-width: 60px; font-weight: bold; }
        input[type=range] { flex: 1; accent-color: var(--tuxedo-white); }
        .val-display { min-width: 35px; text-align: right; color: var(--highlight-green); font-weight: bold; }

        .btn-group { display: flex; gap: 10px; }
        .action-btn { 
            flex: 1; background: #222; color: white; border: 1px solid #444; 
            padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.85rem;
        }
        .btn-export { border-color: var(--highlight-blue); color: var(--highlight-blue); }
    </style>
</head>
<body>

<header>
    <div class="logo">CrystalTory <span>Motion</span></div>
    <div style="display: flex; gap: 10px; align-items: center;">
        <span id="aiStatus" class="status-badge">🧠 엔진 준비 중...</span>
        <div style="font-size: 0.8rem; color: var(--point-silver);">V4.8 🐾</div>
    </div>
</header>

<main>
    <input type="file" id="videoUpload" accept="video/*" style="font-size: 0.85rem;">

    <div class="player-container" id="playerContainer">
        <canvas id="motionCanvas"></canvas>
        <div class="crosshair" id="crosshair"></div>
    </div>

    <div class="tags-container" id="tagsContainer"></div>

    <div class="control-panel">
        <div class="seek-container">
            <button onclick="togglePlay()" id="playBtn" style="background:none; border:none; color:white; font-size:1.2rem; cursor:pointer;">▶</button>
            <input type="range" id="seekBar" value="0" step="0.1">
            <span id="timeDisplay" style="font-size:0.75rem; min-width:75px;">00:00 / 00:00</span>
        </div>

        <div class="sliders-group">
            <div class="slider-row">
                <label>줌 배율</label>
                <input type="range" id="zoomRange" min="1" max="10" step="0.1" value="2.5">
                <span class="val-display" id="zoomVal">2.5x</span>
            </div>
            <div class="slider-row">
                <label>수동 감도</label>
                <input type="range" id="panRange" min="1" max="5" step="0.5" value="2.5">
                <span class="val-display" id="panVal">2.5x</span>
            </div>
        </div>
        
        <div class="btn-group">
            <button class="action-btn" onclick="resetCenter()">🎯 중앙 초기화</button>
            <button class="action-btn btn-export" onclick="exportData()">💾 편집 데이터 추출</button>
        </div>
    </div>
</main>

<video id="hiddenVideo" style="display:none;" crossOrigin="anonymous"></video>

<script>
    const video = document.getElementById('hiddenVideo');
    const canvas = document.getElementById('motionCanvas');
    const ctx = canvas.getContext('2d');
    const seekBar = document.getElementById('seekBar');
    const zoomRange = document.getElementById('zoomRange');
    const zoomVal = document.getElementById('zoomVal');
    const panRange = document.getElementById('panRange');
    const panVal = document.getElementById('panVal');
    const videoUpload = document.getElementById('videoUpload');
    const playBtn = document.getElementById('playBtn');
    const playerContainer = document.getElementById('playerContainer');
    const aiStatus = document.getElementById('aiStatus');

    let zoom = 2.5; let panSensitivity = 2.5; 
    let centerX = 0; let centerY = 0;
    let targetX = 0; let targetY = 0;
    let isDragging = false;
    let lastMouseX = 0; let lastMouseY = 0;

    // 데이터 저장용 변수
    let trackData = []; 
    let savedTags = [];
    let model = null;
    let isDetecting = false;

    const MOTION_TAGS = ['스타트', '슬라럼', '웨이크 진입', '점프', '에어 타임', '랜딩', '피니시'];

    // 태그 버튼 부활
    const tagsContainer = document.getElementById('tagsContainer');
    MOTION_TAGS.forEach(tag => {
        const btn = document.createElement('button');
        btn.className = 'tag-btn';
        btn.innerText = tag;
        btn.onclick = () => {
            savedTags.push({ time: video.currentTime, tag: tag });
            btn.style.borderColor = "var(--highlight-green)";
            setTimeout(() => btn.style.borderColor = "#444", 500);
        };
        tagsContainer.appendChild(btn);
    });

    cocoSsd.load().then(m => { model = m; aiStatus.innerText = "🟢 AI 준비됨"; });

    videoUpload.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            video.src = URL.createObjectURL(file);
            video.onloadedmetadata = () => {
                seekBar.max = video.duration;
                centerX = video.videoWidth / 2; centerY = video.videoHeight / 2;
                targetX = centerX; targetY = centerY;
                render();
            };
        }
    });

    // 1. 드래그 방향 수정 (+를 -로, -를 +로 교체하여 물체를 직접 잡는 느낌으로)
    function startDrag(e) { isDragging = true; lastMouseX = e.clientX; lastMouseY = e.clientY; }
    function drag(e) {
        if (!isDragging) return;
        const dx = e.clientX - lastMouseX; const dy = e.clientY - lastMouseY;
        const scale = ((video.videoWidth / zoom) / playerContainer.offsetWidth) * panSensitivity;
        
        // 🚀 수정됨: 사용자의 손가락 방향대로 화면이 따라오도록 연산 반전
        centerX += dx * scale; 
        centerY += dy * scale;
        
        targetX = centerX; targetY = centerY;
        lastMouseX = e.clientX; lastMouseY = e.clientY;
    }
    function endDrag() { isDragging = false; }

    playerContainer.addEventListener('mousedown', startDrag);
    window.addEventListener('mousemove', drag);
    window.addEventListener('mouseup', endDrag);
    playerContainer.addEventListener('touchstart', (e) => startDrag(e.touches[0]), {passive: false});
    window.addEventListener('touchmove', (e) => { if(isDragging) e.preventDefault(); drag(e.touches[0]); }, {passive: false});
    window.addEventListener('touchend', endDrag);

    // 2. AI 인식률 개선 (확대된 이미지를 분석)
    async function detectPerson() {
        if (!model || video.paused || isDetecting || isDragging) return;
        isDetecting = true;
        try {
            // 원본 비디오 대신 '현재 캔버스(확대된 상태)'를 AI에게 넘겨줍니다!
            const predictions = await model.detect(canvas); 
            const people = predictions.filter(p => p.class === 'person');
            
            if (people.length > 0) {
                // 캔버스 내 중심점 찾기
                const best = people[0]; // 가장 큰 사람
                const bx = best.bbox[0] + best.bbox[2]/2;
                const by = best.bbox[1] + best.bbox[3]/2;

                // 캔버스 상의 좌표를 원본 영상 좌표로 역산하여 targetX 업데이트
                const canvasW = canvas.width; const canvasH = canvas.height;
                const viewW = canvasW / zoom; const viewH = canvasH / zoom;
                
                // 캔버스 중앙이 원본의 centerX이므로, 캔버스 내 상대 좌표를 더해줌
                targetX = (centerX - viewW/2) + (bx / canvasW) * viewW;
                targetY = (centerY - viewH/2) + (by / canvasH) * viewH;
                
                aiStatus.innerText = "🎯 추적 중";
            }
        } finally { isDetecting = false; }
    }

    // 3. 데이터 추출 (Export)
    function exportData() {
        const data = {
            projectName: "CrystalTory_Motion_V4.8",
            timestamp: new Date().toISOString(),
            tags: savedTags,
            paths: trackData
        };
        const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `motion_edit_${Math.floor(Date.now()/1000)}.json`;
        a.click();
    }

    function render() {
        if (video.videoWidth === 0) { requestAnimationFrame(render); return; }
        if (!video.paused && !isDragging) detectPerson();

        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        if (!isDragging) {
            centerX += (targetX - centerX) * 0.15;
            centerY += (targetY - centerY) * 0.15;
        }

        const viewWidth = canvas.width / zoom; const viewHeight = canvas.height / zoom;
        centerX = Math.max(viewWidth / 2, Math.min(canvas.width - viewWidth / 2, centerX));
        centerY = Math.max(viewHeight / 2, Math.min(canvas.height - viewHeight / 2, centerY));

        const sx = centerX - viewWidth / 2; const sy = centerY - viewHeight / 2;
        ctx.drawImage(video, sx, sy, viewWidth, viewHeight, 0, 0, canvas.width, canvas.height);
        
        // 궤적 자동 기록 (0.1초마다)
        if (!video.paused && Math.floor(video.currentTime * 10) % 2 === 0) {
            trackData.push({t: video.currentTime.toFixed(2), x: centerX.toFixed(1), y: centerY.toFixed(1)});
        }

        if (!video.paused) seekBar.value = video.currentTime;
        document.getElementById('timeDisplay').innerText = formatTime(video.currentTime) + " / " + formatTime(video.duration);
        
        // 영상 종료 시 자동 저장 안내 (간단히 콘솔에 표시하거나 버튼 강조)
        if (video.ended) { playBtn.innerText = "▶"; }

        requestAnimationFrame(render);
    }

    function togglePlay() { video.paused ? (video.play(), playBtn.innerText = "Ⅱ") : (video.pause(), playBtn.innerText = "▶"); }
    function resetCenter() { targetX = video.videoWidth / 2; targetY = video.videoHeight / 2; }
    function formatTime(s) { const m = Math.floor(s / 60); return m.toString().padStart(2, '0') + ":" + Math.floor(s % 60).toString().padStart(2, '0'); }
    seekBar.addEventListener('input', () => video.currentTime = seekBar.value);
    zoomRange.addEventListener('input', (e) => { zoom = e.target.value; zoomVal.innerText = zoom + 'x'; });
    panRange.addEventListener('input', (e) => { panSensitivity = e.target.value; panVal.innerText = panSensitivity + 'x'; });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CrystalTory_Motion V6.5 (Smooth Tracking & File Explorer)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        :root {
            --tuxedo-black: #0a0a0a; --tuxedo-dark: #1a1a1a;
            --tuxedo-white: #f5f5f5; --point-silver: #a0a0a0;
            --highlight-green: #bfff00; --highlight-blue: #00d2ff; --highlight-red: #ff4757; --border: #2d2d2d;
            --learning-purple: #b673fe;
        } 

        body {
            background-color: var(--tuxedo-black); color: var(--tuxedo-white);
            font-family: 'Pretendard', -apple-system, sans-serif; margin: 0;
            display: flex; flex-direction: column; min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        } 

        header {
            padding: 12px 20px; background: var(--tuxedo-dark); border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100;
        }
        .logo { font-size: 1.1rem; font-weight: 800; }
        .logo span { color: var(--point-silver); font-weight: 300; }
        
        .db-badge { background: rgba(182, 115, 254, 0.1); color: var(--learning-purple); border: 1px solid var(--learning-purple); padding: 4px 8px; border-radius: 6px; font-size: 0.7rem; font-weight: bold; }

        main { display: flex; flex-direction: column; padding: 10px; gap: 12px; flex: 1; } 

        .file-status-bar {
            background: #111; padding: 15px; border-radius: 12px; border: 1px solid #333;
            display: flex; flex-direction: column; gap: 10px; transition: 0.3s;
        }
        .file-status-bar.recovered { border-color: var(--highlight-green); background: #131a13; }
        .status-title { font-size: 0.7rem; color: #666; text-transform: uppercase; letter-spacing: 1px; }
        .file-row { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        .file-label { font-size: 0.85rem; color: #aaa; flex-shrink: 0; }
        .file-name { 
            font-weight: bold; font-size: 0.85rem; padding: 5px 10px; background: #222; border-radius: 6px;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; text-align: right;
            border: 1px solid transparent; transition: 0.3s;
        }
        .file-name.success { color: var(--highlight-green); border-color: var(--highlight-green); background: rgba(191,255,0,0.1); }

        .matching-guide {
            font-size: 0.75rem; padding: 10px; background: rgba(0, 210, 255, 0.05); 
            border-radius: 10px; border: 1px solid rgba(0, 210, 255, 0.2); color: var(--highlight-blue);
            text-align: center; line-height: 1.4;
        }

        .file-ops { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .file-btn { 
            background: #1e1e1e; border: 1px solid #333; color: #ddd; 
            padding: 12px; border-radius: 10px; text-align: center; font-size: 0.75rem; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; gap: 5px; font-weight: bold;
        }
        .hidden-input { display: none; } 

        .player-container {
            position: relative; background: #000; border-radius: 12px;
            overflow: hidden; aspect-ratio: 16 / 9; border: 1px solid var(--border); width: 100%;
        }
        #motionCanvas { width: 100%; height: 100%; display: block; }
        
        .playback-controls { display: flex; justify-content: space-around; align-items: center; padding: 10px 0; }
        .ctrl-btn { 
            background: #222; border: 1px solid #444; color: white; 
            width: 55px; height: 55px; border-radius: 50%; display: flex; justify-content: center; align-items: center;
            font-size: 1rem; font-weight: bold; cursor: pointer;
        }
        .play-main-btn { width: 70px; height: 70px; background: var(--tuxedo-white); color: black; font-size: 1.8rem; }
        .add-marker-btn { 
            background: rgba(182, 115, 254, 0.2); border: 2px solid var(--learning-purple); color: var(--learning-purple);
            width: auto; height: 55px; border-radius: 30px; padding: 0 25px; font-size: 1rem;
        }

        .seekbar-container { display: flex; align-items: center; gap: 10px; padding: 5px 0; }
        input[type=range] { flex: 1; accent-color: var(--highlight-blue); height: 25px; cursor: pointer; }
        .time-text { font-size: 0.75rem; color: #888; min-width: 80px; text-align: right; font-variant-numeric: tabular-nums; }

        .timeline-editor {
            background: var(--tuxedo-dark); border-radius: 15px; border: 1px solid var(--border);
            flex: 1; display: flex; flex-direction: column; overflow: hidden;
        }
        .timeline-header { padding: 15px; border-bottom: 1px solid var(--border); background: #1f1f1f; display:flex; justify-content:space-between; align-items:center; }
        .segment-list { padding: 12px; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; max-height: 400px; }
        
        .segment-item { 
            background: #111; padding: 15px; border-radius: 12px; border: 1px solid #222;
            display: flex; flex-direction: column; gap: 12px;
        }
        .segment-item.active { border-color: var(--highlight-green); background: #151a15; }
        
        .seg-label-select { 
            background: #222; color: white; border: 1px solid #444; padding: 12px; 
            border-radius: 8px; font-size: 1rem; flex: 1; font-weight: bold; outline: none;
        }

        .item-actions { display: flex; gap: 10px; justify-content: space-between; align-items: center; }
        .icon-btn { background: #333; border: 1px solid #444; color: white; padding: 10px 15px; border-radius: 8px; font-size: 0.85rem; font-weight: bold; }

        .bottom-panel { display: flex; gap: 10px; padding: 10px 0 30px 0; }
        .bottom-btn { flex: 1; padding: 18px; border-radius: 12px; border: none; font-weight: bold; font-size: 1rem; color: white; background: #222; border: 1px solid #444; }
        .btn-save { border-color: var(--highlight-blue); color: var(--highlight-blue); }
    </style>
</head>
<body> 

<header>
    <div class="logo">Tory <span>Motion V6.5</span></div>
    <div style="display: flex; gap: 8px;">
        <span id="patternBadge" class="db-badge">🧠 기억: 0</span>
        <span id="aiStatus" style="font-size:0.7rem; color:#888;">AI Ready</span>
    </div>
</header> 

<main>
    <div id="fileStatusBar" class="file-status-bar">
        <div class="status-title">File Matching Status</div>
        <div class="file-row">
            <span class="file-label">🎬 영상:</span>
            <span id="videoNameDisp" class="file-name">선택 안됨</span>
        </div>
        <div id="matchingGuide" class="matching-guide">
            영상을 먼저 연 후, <b>[2. 작업 열기]</b>를 통해<br>PC에서 가져온 JSON 파일을 선택하세요.
        </div>
        <div class="file-row">
            <span class="file-label">📁 데이터:</span>
            <span id="jsonNameDisp" class="file-name" style="color:var(--learning-purple);">선택 안됨</span>
        </div>
    </div>

    <div class="file-ops">
        <label class="file-btn">🎬 1. 영상 열기<input type="file" id="videoUpload" class="hidden-input"></label>
        <label class="file-btn" style="color:var(--highlight-blue);">📁 2. 작업 열기<input type="file" id="jsonUpload" accept=".json" class="hidden-input"></label>
        <button class="file-btn" style="color:var(--learning-purple);" onclick="exportPatternMemory()">📤 3. 기억 내보내기</button>
        <label class="file-btn" style="color:var(--learning-purple);">📥 4. 기억 주입하기<input type="file" id="patternUpload" accept=".json" class="hidden-input"></label>
    </div>

    <div class="player-container"><canvas id="motionCanvas"></canvas></div> 

    <div class="playback-controls">
        <button class="ctrl-btn" onclick="skip(-5)">-5</button>
        <button class="ctrl-btn play-main-btn" onclick="togglePlay()" id="playBtn">▶</button>
        <button class="ctrl-btn" onclick="skip(5)">+5</button>
        <button class="ctrl-btn add-marker-btn" onclick="addManualSegment()">✨ + 액션 캡처</button>
    </div>
    
    <div class="seekbar-container">
        <input type="range" id="seekBar" value="0" step="0.1">
        <span id="timeDisplay" class="time-text">00:00 / 00:00</span>
    </div> 

    <div class="timeline-editor">
        <div class="timeline-header">
            <span style="font-size:0.9rem; font-weight:bold;">🎥 수집된 액션 타임라인</span>
            <button onclick="clearAllSegments()" style="background:none; border:1px solid #444; color:#888; font-size:0.75rem; padding:5px 10px; border-radius:6px;">전체 삭제</button>
        </div>
        <div class="segment-list" id="segmentList"></div>
    </div> 

    <div class="bottom-panel">
        <button class="bottom-btn" onclick="resetCenter()">🧹 궤적 초기화</button>
        <button class="bottom-btn btn-save" onclick="exportData()">💾 JSON 저장</button>
    </div>
</main> 

<video id="hiddenVideo" style="display:none;" playsinline muted></video> 

<script>
    const video = document.getElementById('hiddenVideo');
    const canvas = document.getElementById('motionCanvas');
    const ctx = canvas.getContext('2d');
    const seekBar = document.getElementById('seekBar');
    const videoUpload = document.getElementById('videoUpload');
    const jsonUpload = document.getElementById('jsonUpload');
    const patternUpload = document.getElementById('patternUpload');
    const playBtn = document.getElementById('playBtn');
    const aiStatus = document.getElementById('aiStatus');
    const segmentListUI = document.getElementById('segmentList');
    const patternBadge = document.getElementById('patternBadge');
    
    const fileStatusBar = document.getElementById('fileStatusBar');
    const videoNameDisp = document.getElementById('videoNameDisp');
    const jsonNameDisp = document.getElementById('jsonNameDisp');
    const matchingGuide = document.getElementById('matchingGuide');

    let currentZoom = 2.5; let targetZoom = 2.5;  
    let centerX = 0; let centerY = 0;
    let targetX = 0; let targetY = 0;
    let trackData = []; let segments = [];
    let isRendering = false;
    let currentProjectName = "Tory_Video";

    const MOTION_TAGS = ['기본 트래킹', '스타트', '슬라럼', '웨이크 진입', '점프', '에어 타임', '랜딩', '피니시', '낙수']; 
    let patternMemory = JSON.parse(localStorage.getItem('Tory_PatternDB')) || [];
    updatePatternBadge();

    function updatePatternBadge() { patternBadge.innerText = `🧠 기억: ${patternMemory.length}`; }

    // 영상 로드 
    videoUpload.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            const rawName = file.name;
            currentProjectName = rawName.split('.')[0];
            videoNameDisp.innerText = rawName;
            videoNameDisp.className = "file-name";
            fileStatusBar.classList.remove('recovered');
            
            matchingGuide.style.display = "block";
            matchingGuide.innerHTML = `💡 <b>[${rawName}]</b>와 짝이 맞는<br>JSON 파일을 불러오면 원본 이름을 복구합니다.`;
            
            video.src = URL.createObjectURL(file);
            video.onloadedmetadata = () => {
                seekBar.max = video.duration;
                centerX = video.videoWidth / 2; centerY = video.videoHeight / 2;
                targetX = centerX; targetY = centerY;
                if(!isRendering) { isRendering = true; render(); }
            };
        }
    });

    // JSON 로드
    jsonUpload.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            try {
                const data = JSON.parse(event.target.result);
                jsonNameDisp.innerText = file.name;
                
                if (data.video_name) {
                    currentProjectName = data.video_name.split('.')[0];
                    videoNameDisp.innerText = data.video_name + " (복원됨 ✨)";
                    videoNameDisp.className = "file-name success";
                    fileStatusBar.classList.add('recovered');
                    matchingGuide.innerHTML = `✅ <b>매칭 성공!</b><br>원본 궤적 데이터와 이름을 모두 찾았습니다.`;
                }

                if (data.trackData) trackData = data.trackData;
                
                if (data.events && data.events.length > 0) {
                    if (confirm("💡 AI 자동 마커들을 지우고 '백지 상태'로 시작할까요? (추천)")) {
                        segments = [];
                    } else {
                        segments = data.events.map((ev, i) => ({
                            id: Date.now() + i, start: ev.time_sec, end: ev.time_sec + 2.0,
                            label: ev.type === 'JUMP' ? '점프' : (ev.type === 'WAKE_CROSS' ? '슬라럼' : '기본 트래킹'),
                            isLearned: false
                        }));
                    }
                } else if (data.segments) {
                    segments = data.segments;
                }

                updateSegmentListUI();
            } catch(err) { alert("❌ JSON 로드 실패"); }
        };
        reader.readAsText(file);
    });

    function addManualSegment() {
        if (!video.duration) return alert("영상을 먼저 열어주세요!");
        const cur = Math.round(video.currentTime * 10) / 10;
        segments.push({ id: Date.now(), start: cur, end: Math.min(cur + 2.0, video.duration), label: '기본 트래킹', isLearned: false });
        segments.sort((a, b) => a.start - b.start);
        updateSegmentListUI();
    }

    function updateSegmentListUI() {
        segmentListUI.innerHTML = '';
        if(segments.length === 0) {
            segmentListUI.innerHTML = `<div style="text-align:center; padding:30px; color:#666; font-size:0.9rem;">영상을 보다가 멋진 액션이 나오면<br><b style="color:var(--learning-purple);">[+ 액션 캡처]</b>를 눌러주세요.</div>`;
            return;
        }
        segments.forEach(seg => {
            const item = document.createElement('div');
            item.className = 'segment-item';
            if (video.currentTime >= seg.start && video.currentTime <= seg.end) item.classList.add('active');
            let learnedStyle = seg.isLearned ? `border-color: var(--learning-purple); color: var(--learning-purple);` : '';
            item.innerHTML = `
                <div style="display:flex; gap:10px;">
                    <select class="seg-label-select" style="${learnedStyle}" onchange="updateLabel(${seg.id}, this.value)">
                        ${MOTION_TAGS.map(tag => `<option value="${tag}" ${seg.label === tag ? 'selected' : ''}>${tag}</option>`).join('')}
                    </select>
                    <button class="icon-btn" style="background:#442222; color:var(--highlight-red);" onclick="deleteSegment(${seg.id})">삭제</button>
                </div>
                <div class="item-actions">
                    <span style="font-size:0.85rem; color:var(--highlight-green);">${formatTime(seg.start)} ~ ${formatTime(seg.end)}</span>
                    <button class="icon-btn" onclick="playSegment(${seg.id})">재생 ▶</button>
                </div>
            `;
            segmentListUI.appendChild(item);
        });
    }

    function updateLabel(id, newLabel) {
        const s = segments.find(i => i.id === id);
        if (s) {
            s.label = newLabel; s.isLearned = true;
            patternMemory.push({ label: newLabel, time: s.start });
            localStorage.setItem('Tory_PatternDB', JSON.stringify(patternMemory));
            updatePatternBadge();
            updateSegmentListUI();
        }
    }

    function deleteSegment(id) { segments = segments.filter(s => s.id !== id); updateSegmentListUI(); }
    function clearAllSegments() { if(confirm("전체 삭제하시겠습니까?")) { segments = []; updateSegmentListUI(); } }

    // 💡 [수정2] 파트너님이 짜셨던 완벽한 '부드러운 보간법' 로직 복구
    function getStoredTrack(time) {
        if (trackData.length === 0) return null;
        let prev = trackData[0], next = trackData[trackData.length - 1];
        
        for(let i=0; i<trackData.length; i++) {
            if(trackData[i].t <= time) prev = trackData[i];
            if(trackData[i].t > time) { next = trackData[i]; break; }
        }
        
        // 두 프레임 사이를 자연스럽게 이어주는 수학
        if (prev && next && next.t > prev.t && (next.t - prev.t <= 0.5)) {
            const ratio = (time - prev.t) / (next.t - prev.t);
            return {
                x: prev.x + (next.x - prev.x) * ratio,
                y: prev.y + (next.y - prev.y) * ratio,
                z: prev.z + (next.z - prev.z) * ratio
            };
        }
        return prev;
    }

    function render() {
        if (video.videoWidth === 0) { requestAnimationFrame(render); return; }
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        
        // 💡 [수정3] 흔들림 없는 타겟 추적 
        if (trackData.length > 0 && !video.paused) {
            let currentTrack = getStoredTrack(video.currentTime); // 보간법 적용
            if(currentTrack) { 
                targetX = currentTrack.x; 
                targetY = currentTrack.y; 
                targetZoom = currentTrack.z; 
            }
        }

        // 약간의 관성을 줘서 더욱 시네마틱하게 이동
        centerX += (targetX - centerX) * 0.25; 
        centerY += (targetY - centerY) * 0.25;
        currentZoom += (targetZoom - currentZoom) * 0.15;
        
        const vW = canvas.width / currentZoom; 
        const vH = canvas.height / currentZoom;
        
        ctx.drawImage(video, centerX - vW/2, centerY - vH/2, vW, vH, 0, 0, canvas.width, canvas.height);
        
        if (!video.paused) {
            seekBar.value = video.currentTime;
            document.getElementById('timeDisplay').innerText = `${formatTime(video.currentTime)} / ${formatTime(video.duration)}`;
        }
        requestAnimationFrame(render);
    }

    function togglePlay() {
        if (video.paused) { video.play(); playBtn.innerText = "Ⅱ"; }
        else { video.pause(); playBtn.innerText = "▶"; updateSegmentListUI(); }
    }
    function skip(v) { video.currentTime += v; }
    function formatTime(s) { const m = Math.floor(s/60); const sec = Math.floor(s%60); return `${m}:${sec.toString().padStart(2,'0')}`; }
    function resetCenter() { targetX = video.videoWidth/2; targetY = video.videoHeight/2; trackData = []; alert("🧹 궤적 초기화"); }
    function exportData() {
        const blob = new Blob([JSON.stringify({ trackData, segments, video_name: currentProjectName + ".mp4" })], {type:'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
        a.download = `${currentProjectName}_Verified.json`; a.click();
    }
    function exportPatternMemory() {
        const blob = new Blob([JSON.stringify(patternMemory)], {type:'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
        a.download = `Tory_AI_Brain.json`; a.click();
    }
    function playSegment(id) {
        const s = segments.find(i => i.id === id); if(!s) return;
        video.currentTime = s.start; video.play(); playBtn.innerText = "Ⅱ";
    }
    seekBar.addEventListener('input', () => { video.currentTime = seekBar.value; });
</script>
</body>
</html>

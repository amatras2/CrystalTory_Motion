<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CrystalTory_Motion V4.0 (Auto-Tracking Engine)</title>
    <style>
        :root {
            --tuxedo-black: #0a0a0a; --tuxedo-dark: #1a1a1a;
            --tuxedo-white: #f5f5f5; --point-silver: #a0a0a0;
            --highlight-green: #bfff00; --highlight-red: #ff4757; --border: #2d2d2d;
        }

        body {
            background-color: var(--tuxedo-black); color: var(--tuxedo-white);
            font-family: 'Pretendard', sans-serif; margin: 0;
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
            touch-action: none;
        }

        header {
            padding: 15px 25px; background: var(--tuxedo-dark); border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo { font-size: 1.2rem; font-weight: 800; }
        .logo span { color: var(--point-silver); font-weight: 300; }

        main { flex: 1; display: flex; flex-direction: column; padding: 15px; gap: 10px; overflow-y: auto; }

        .player-container {
            position: relative; background: #000; border-radius: 12px;
            overflow: hidden; aspect-ratio: 16 / 9; border: 1px solid var(--border);
            cursor: grab; flex-shrink: 0;
        }
        .player-container:active { cursor: grabbing; }

        #motionCanvas { width: 100%; height: 100%; display: block; touch-action: none; }

        .control-panel { background: var(--tuxedo-dark); padding: 15px; border-radius: 12px; display: flex; flex-direction: column; gap: 10px; flex-shrink: 0;}
        .seek-container { display: flex; align-items: center; gap: 10px; }
        #seekBar { flex: 1; cursor: pointer; accent-color: var(--highlight-green); }
        
        .sliders-group {
            display: flex; flex-direction: column; gap: 12px; 
            background: #111; padding: 12px; border-radius: 8px; border: 1px solid var(--border);
        }
        .slider-row { display: flex; align-items: center; gap: 15px; font-size: 0.85rem; color: var(--point-silver); }
        .slider-row label { min-width: 60px; font-weight: bold; }
        input[type=range] { flex: 1; accent-color: var(--tuxedo-white); }
        .val-display { min-width: 35px; text-align: right; color: var(--highlight-green); font-weight: bold; }

        .btn-group { display: flex; gap: 10px; margin-top: 5px; }
        .action-btn { 
            flex: 1; background: #222; color: white; border: 1px solid #444; 
            padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s;
        }
        .action-btn:active { transform: scale(0.98); }
        .btn-record.recording { background: #3a0000; border-color: var(--highlight-red); color: var(--highlight-red); }
        .btn-auto.active { background: #002200; border-color: var(--highlight-green); color: var(--highlight-green); }

        /* 태그 패널 */
        .tags-container { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .tag-btn { 
            background: #333; color: #ddd; border: none; padding: 6px 12px; 
            border-radius: 20px; font-size: 0.8rem; cursor: pointer; white-space: nowrap;
        }
        .tag-btn:hover { background: #444; }

    </style>
</head>
<body>

<header>
    <div class="logo">CrystalTory <span>Motion</span></div>
    <div style="font-size: 0.8rem; color: var(--point-silver);">수정아빠의 작업실 (V4.0) 🐾</div>
</header>

<main>
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <input type="file" id="videoUpload" accept="video/*" style="font-size: 0.85rem;">
        <span id="recordStatus" style="font-size: 0.8rem; color: var(--highlight-red); display: none;">● 녹화 중</span>
    </div>

    <div class="player-container" id="playerContainer">
        <canvas id="motionCanvas"></canvas>
    </div>

    <div class="tags-container" id="tagsContainer">
        </div>

    <div class="control-panel">
        <div class="seek-container">
            <button onclick="togglePlay()" id="playBtn" style="background:none; border:none; color:white; font-size:1.2rem; cursor:pointer;">▶</button>
            <input type="range" id="seekBar" value="0" step="0.1">
            <span id="timeDisplay" style="font-size:0.75rem; min-width:75px;">00:00 / 00:00</span>
        </div>

        <div class="sliders-group">
            <div class="slider-row">
                <label>줌 배율</label>
                <input type="range" id="zoomRange" min="1" max="10" step="0.1" value="1">
                <span class="val-display" id="zoomVal">1.0x</span>
            </div>
            <div class="slider-row">
                <label>드래그 감도</label>
                <input type="range" id="panRange" min="1" max="5" step="0.5" value="2.5">
                <span class="val-display" id="panVal">2.5x</span>
            </div>
        </div>
        
        <div class="btn-group">
            <button id="btnRecord" class="action-btn btn-record" onclick="toggleRecord()">⏺ 궤적 녹화</button>
            <button id="btnAuto" class="action-btn btn-auto" onclick="toggleAutoTrack()">🤖 오토 트래킹</button>
            <button class="action-btn" onclick="resetCenter()">🎯 중앙 초기화</button>
        </div>
    </div>
</main>

<video id="hiddenVideo" style="display:none;"></video>

<script>
    const video = document.getElementById('hiddenVideo');
    const canvas = document.getElementById('motionCanvas');
    const ctx = canvas.getContext('2d');
    const seekBar = document.getElementById('seekBar');
    const zoomRange = document.getElementById('zoomRange');
    const zoomVal = document.getElementById('zoomVal');
    const panRange = document.getElementById('panRange');
    const panVal = document.getElementById('panVal');
    const videoUpload = document.getElementById('videoUpload');
    const playBtn = document.getElementById('playBtn');
    const playerContainer = document.getElementById('playerContainer');
    const btnRecord = document.getElementById('btnRecord');
    const btnAuto = document.getElementById('btnAuto');
    const recordStatus = document.getElementById('recordStatus');

    let zoom = 1.0;
    let panSensitivity = 2.5; 
    
    let centerX = 0;
    let centerY = 0;
    let isDragging = false;
    let lastMouseX = 0;
    let lastMouseY = 0;

    // V4.0: 트래킹 데이터 및 상태 변수
    let isRecording = false;
    let isAutoTracking = false;
    let trackData = []; // { time, x, y } 객체 배열
    let motionTags = []; // 찍은 태그 배열

    const TAG_LIST = ['스타트', '슬라럼', '웨이크 진입', '점프', '에어 타임', '랜딩', '피니시'];

    // 태그 버튼 생성
    const tagsContainer = document.getElementById('tagsContainer');
    TAG_LIST.forEach(tag => {
        const btn = document.createElement('button');
        btn.className = 'tag-btn';
        btn.innerText = tag;
        btn.onclick = () => {
            motionTags.push({ time: video.currentTime, tag: tag });
            console.log(`[${formatTime(video.currentTime)}] ${tag} 태그 저장됨!`);
            // 시각적 피드백
            btn.style.background = 'var(--highlight-green)';
            btn.style.color = '#000';
            setTimeout(() => { btn.style.background = '#333'; btn.style.color = '#ddd'; }, 300);
        };
        tagsContainer.appendChild(btn);
    });

    videoUpload.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            video.src = URL.createObjectURL(file);
            video.onloadedmetadata = () => {
                seekBar.max = video.duration;
                centerX = video.videoWidth / 2;
                centerY = video.videoHeight / 2;
                trackData = []; // 새 영상 로드 시 기록 초기화
                render();
            };
        }
    });

    // --- 드래그 이벤트 (V3.3 동일 + 기록 로직 추가) ---
    playerContainer.addEventListener('mousedown', startDrag);
    window.addEventListener('mousemove', drag);
    window.addEventListener('mouseup', endDrag);

    playerContainer.addEventListener('touchstart', (e) => startDrag(e.touches[0]), {passive: false});
    window.addEventListener('touchmove', (e) => {
        if(isDragging) e.preventDefault();
        drag(e.touches[0]);
    }, {passive: false});
    window.addEventListener('touchend', endDrag);

    function startDrag(e) {
        if (isAutoTracking) return; // 오토 트래킹 중에는 수동 조작 금지
        isDragging = true;
        lastMouseX = e.clientX;
        lastMouseY = e.clientY;
    }

    function drag(e) {
        if (!isDragging || isAutoTracking) return;
        
        const dx = e.clientX - lastMouseX;
        const dy = e.clientY - lastMouseY;

        const displayWidth = playerContainer.offsetWidth;
        const scale = ((video.videoWidth / zoom) / displayWidth) * panSensitivity;
        
        centerX -= dx * scale;
        centerY -= dy * scale;

        lastMouseX = e.clientX;
        lastMouseY = e.clientY;

        // 녹화 중이면 현재 시간과 중심 좌표를 저장
        if (isRecording && !video.paused) {
            trackData.push({ time: video.currentTime, x: centerX, y: centerY });
        }
    }

    function endDrag() { isDragging = false; }

    // --- 버튼 컨트롤 함수 ---
    function resetCenter() {
        centerX = video.videoWidth / 2;
        centerY = video.videoHeight / 2;
    }

    function togglePlay() {
        if (video.paused) { video.play(); playBtn.innerText = "Ⅱ"; }
        else { video.pause(); playBtn.innerText = "▶"; }
    }

    function toggleRecord() {
        isRecording = !isRecording;
        if (isRecording) {
            isAutoTracking = false; // 녹화 시 오토트래킹 해제
            btnAuto.classList.remove('active');
            btnRecord.classList.add('recording');
            btnRecord.innerText = "⏹ 녹화 종료";
            recordStatus.style.display = "inline";
            if(video.paused) togglePlay(); // 자동 재생
        } else {
            btnRecord.classList.remove('recording');
            btnRecord.innerText = "⏺ 궤적 녹화";
            recordStatus.style.display = "none";
            // 데이터 정렬
            trackData.sort((a, b) => a.time - b.time);
            console.log("기록된 데이터 개수:", trackData.length);
        }
    }

    function toggleAutoTrack() {
        if (trackData.length === 0) {
            alert("먼저 '궤적 녹화'를 통해 라이더를 따라가 주세요!");
            return;
        }
        isAutoTracking = !isAutoTracking;
        if (isAutoTracking) {
            isRecording = false;
            btnRecord.classList.remove('recording');
            btnRecord.innerText = "⏺ 궤적 녹화";
            recordStatus.style.display = "none";
            btnAuto.classList.add('active');
            btnAuto.innerText = "🤖 오토 트래킹 켬";
        } else {
            btnAuto.classList.remove('active');
            btnAuto.innerText = "🤖 오토 트래킹";
        }
    }

    // --- 스무딩 (선형 보간법) 계산 엔진 ---
    function getSmoothedCoordinates(currentTime) {
        if (trackData.length === 0) return { x: centerX, y: centerY };
        if (trackData.length === 1) return trackData[0];

        let prev = trackData[0];
        let next = trackData[trackData.length - 1];

        // 현재 시간과 가장 가까운 앞뒤 기록을 찾음
        for (let i = 0; i < trackData.length - 1; i++) {
            if (trackData[i].time <= currentTime && trackData[i+1].time >= currentTime) {
                prev = trackData[i];
                next = trackData[i+1];
                break;
            }
        }

        if (prev === next || currentTime <= prev.time) return prev;
        if (currentTime >= next.time) return next;

        // 두 좌표 사이를 시간에 비례해 부드럽게 이어줌 (Lerp)
        const t = (currentTime - prev.time) / (next.time - prev.time);
        const smoothX = prev.x + (next.x - prev.x) * t;
        const smoothY = prev.y + (next.y - prev.y) * t;
        
        return { x: smoothX, y: smoothY };
    }

    // --- 이벤트 리스너 ---
    seekBar.addEventListener('input', () => { video.currentTime = seekBar.value; });
    zoomRange.addEventListener('input', (e) => { zoom = e.target.value; zoomVal.innerText = zoom + 'x'; });
    panRange.addEventListener('input', (e) => { panSensitivity = e.target.value; panVal.innerText = panSensitivity + 'x'; });

    // --- 메인 렌더링 루프 ---
    function render() {
        if (video.videoWidth === 0) { requestAnimationFrame(render); return; }

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        // 오토 트래킹 모드일 때 스무딩 좌표 적용
        if (isAutoTracking && !isDragging) {
            const coords = getSmoothedCoordinates(video.currentTime);
            centerX = coords.x;
            centerY = coords.y;
        }

        const viewWidth = canvas.width / zoom;
        const viewHeight = canvas.height / zoom;

        // 화면 밖으로 나가지 않게 보정
        centerX = Math.max(viewWidth / 2, Math.min(canvas.width - viewWidth / 2, centerX));
        centerY = Math.max(viewHeight / 2, Math.min(canvas.height - viewHeight / 2, centerY));

        const sx = centerX - viewWidth / 2;
        const sy = centerY - viewHeight / 2;

        ctx.drawImage(video, sx, sy, viewWidth, viewHeight, 0, 0, canvas.width, canvas.height);
        
        if (!video.paused) { seekBar.value = video.currentTime; }
        document.getElementById('timeDisplay').innerText = formatTime(video.currentTime) + " / " + formatTime(video.duration);
        
        requestAnimationFrame(render);
    }

    function formatTime(seconds) {
        if (isNaN(seconds)) return "00:00";
        const m = Math.floor(seconds / 60); const s = Math.floor(seconds % 60);
        return m.toString().padStart(2, '0') + ":" + s.toString().padStart(2, '0');
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CrystalTory_Motion V3.2 (Smooth Pan & Zoom)</title>
    <style>
        :root {
            --tuxedo-black: #0a0a0a; --tuxedo-dark: #1a1a1a;
            --tuxedo-white: #f5f5f5; --point-silver: #a0a0a0;
            --highlight-green: #bfff00; --border: #2d2d2d;
        }

        body {
            background-color: var(--tuxedo-black); color: var(--tuxedo-white);
            font-family: 'Pretendard', sans-serif; margin: 0;
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
            touch-action: none;
        }

        header {
            padding: 15px 25px; background: var(--tuxedo-dark); border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo { font-size: 1.2rem; font-weight: 800; }
        .logo span { color: var(--point-silver); }

        main { flex: 1; display: flex; flex-direction: column; padding: 15px; gap: 15px; }

        .player-container {
            position: relative; background: #000; border-radius: 12px;
            overflow: hidden; aspect-ratio: 16 / 9; border: 1px solid var(--border);
            cursor: grab;
        }
        .player-container:active { cursor: grabbing; }

        #motionCanvas { width: 100%; height: 100%; display: block; touch-action: none; }

        .control-panel { background: var(--tuxedo-dark); padding: 15px; border-radius: 12px; display: flex; flex-direction: column; gap: 10px; }
        .seek-container { display: flex; align-items: center; gap: 10px; }
        #seekBar { flex: 1; cursor: pointer; accent-color: var(--highlight-green); }
        .zoom-container { display: flex; align-items: center; gap: 15px; font-size: 0.9rem; color: var(--point-silver); }
        #zoomRange { flex: 1; accent-color: var(--tuxedo-white); }

        .guide-text { font-size: 0.85rem; color: #888; text-align: center; margin-top: 5px; }
    </style>
</head>
<body>

<header>
    <div class="logo">CRYSTAL TORY <span>MOTION</span></div>
    <div style="font-size: 0.8rem; color: var(--point-silver);">수정아빠의 작업실 (V3.2) 🐾</div>
</header>

<main>
    <input type="file" id="videoUpload" accept="video/*">

    <div class="player-container" id="playerContainer">
        <canvas id="motionCanvas"></canvas>
    </div>
    
    <p class="guide-text">💡 <b>화면을 드래그</b>하여 라이더를 따라가고, <b>아래 슬라이더로 줌</b>을 조절하세요.</p>

    <div class="control-panel">
        <div class="seek-container">
            <button onclick="togglePlay()" id="playBtn" style="background:none; border:none; color:white; font-size:1.2rem; cursor:pointer;">▶</button>
            <input type="range" id="seekBar" value="0" step="0.1">
            <span id="timeDisplay" style="font-size:0.75rem; min-width:75px;">00:00 / 00:00</span>
        </div>

        <div class="zoom-container">
            <span>ZOOM</span>
            <input type="range" id="zoomRange" min="1" max="10" step="0.1" value="1">
            <span id="zoomVal">1.0x</span>
        </div>
        
        <button onclick="resetCenter()" style="background:#222; color:white; border:1px solid #444; padding:8px; border-radius:6px; margin-top:5px;">정중앙으로 초기화</button>
    </div>
</main>

<video id="hiddenVideo" style="display:none;"></video>

<script>
    const video = document.getElementById('hiddenVideo');
    const canvas = document.getElementById('motionCanvas');
    const ctx = canvas.getContext('2d');
    const seekBar = document.getElementById('seekBar');
    const zoomRange = document.getElementById('zoomRange');
    const zoomVal = document.getElementById('zoomVal');
    const videoUpload = document.getElementById('videoUpload');
    const playBtn = document.getElementById('playBtn');
    const playerContainer = document.getElementById('playerContainer');

    let zoom = 1.0;
    
    // 비디오 원본 기준 중심 좌표 (이 좌표가 화면의 정중앙에 오도록 그립니다)
    let centerX = 0;
    let centerY = 0;

    let isDragging = false;
    let lastMouseX = 0;
    let lastMouseY = 0;

    videoUpload.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            video.src = URL.createObjectURL(file);
            video.onloadedmetadata = () => {
                seekBar.max = video.duration;
                centerX = video.videoWidth / 2;
                centerY = video.videoHeight / 2;
                render();
            };
        }
    });

    // 🖐️ 완벽하게 수정된 수동 드래그(Pan) 로직
    playerContainer.addEventListener('mousedown', startDrag);
    window.addEventListener('mousemove', drag);
    window.addEventListener('mouseup', endDrag);

    playerContainer.addEventListener('touchstart', (e) => startDrag(e.touches[0]), {passive: false});
    window.addEventListener('touchmove', (e) => {
        if(isDragging) e.preventDefault(); // 스크롤 방지
        drag(e.touches[0]);
    }, {passive: false});
    window.addEventListener('touchend', endDrag);

    function startDrag(e) {
        isDragging = true;
        lastMouseX = e.clientX;
        lastMouseY = e.clientY;
    }

    function drag(e) {
        if (!isDragging) return;
        
        // 이동한 픽셀 거리 계산
        const dx = e.clientX - lastMouseX;
        const dy = e.clientY - lastMouseY;

        // 핵심 수학 고침: 
        // 화면에서 dx만큼 움직였을 때, 원본 비디오 기준으로는 얼마나 움직인 것인가?
        // (비디오원본너비 / 줌배율) / 화면너비 = 화면 1픽셀당 비디오 픽셀 수
        const displayWidth = playerContainer.offsetWidth;
        const scale = (video.videoWidth / zoom) / displayWidth;
        
        // 마우스를 왼쪽으로 밀면(dx가 음수) 화면은 오른쪽을 보여줘야 하므로 빼줍니다.
        centerX -= dx * scale;
        centerY -= dy * scale;

        lastMouseX = e.clientX;
        lastMouseY = e.clientY;
    }

    function endDrag() { isDragging = false; }

    function resetCenter() {
        centerX = video.videoWidth / 2;
        centerY = video.videoHeight / 2;
    }

    function togglePlay() {
        if (video.paused) { video.play(); playBtn.innerText = "Ⅱ"; }
        else { video.pause(); playBtn.innerText = "▶"; }
    }

    seekBar.addEventListener('input', () => { video.currentTime = seekBar.value; });
    
    zoomRange.addEventListener('input', (e) => { 
        zoom = e.target.value; 
        zoomVal.innerText = zoom + 'x'; 
    });

    function render() {
        if (video.videoWidth === 0) { requestAnimationFrame(render); return; }

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        // 현재 줌 배율에 맞춰 보여줄 비디오 영역의 너비와 높이
        const viewWidth = canvas.width / zoom;
        const viewHeight = canvas.height / zoom;

        // 캔버스 경계선 밖으로 나가지 않도록 좌표 꽉 잡아주기
        centerX = Math.max(viewWidth / 2, Math.min(canvas.width - viewWidth / 2, centerX));
        centerY = Math.max(viewHeight / 2, Math.min(canvas.height - viewHeight / 2, centerY));

        // 자를 영역의 좌측 상단 좌표 계산
        const sx = centerX - viewWidth / 2;
        const sy = centerY - viewHeight / 2;

        // 그리기 (마법이 일어나는 곳)
        ctx.drawImage(video, sx, sy, viewWidth, viewHeight, 0, 0, canvas.width, canvas.height);
        
        if (!video.paused) { seekBar.value = video.currentTime; }
        document.getElementById('timeDisplay').innerText = formatTime(video.currentTime) + " / " + formatTime(video.duration);
        
        requestAnimationFrame(render);
    }

    function formatTime(seconds) {
        if (isNaN(seconds)) return "00:00";
        const m = Math.floor(seconds / 60); const s = Math.floor(seconds % 60);
        return m.toString().padStart(2, '0') + ":" + s.toString().padStart(2, '0');
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CrystalTory_Motion V5.0 (Final Review)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        :root {
            --tuxedo-black: #0a0a0a; --tuxedo-dark: #1a1a1a;
            --tuxedo-white: #f5f5f5; --point-silver: #a0a0a0;
            --highlight-green: #bfff00; --highlight-blue: #00d2ff; --highlight-red: #ff4757; --border: #2d2d2d;
        }

        body {
            background-color: var(--tuxedo-black); color: var(--tuxedo-white);
            font-family: 'Pretendard', sans-serif; margin: 0;
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
            touch-action: none;
        }

        header {
            padding: 15px 25px; background: var(--tuxedo-dark); border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;
        }
        .logo { font-size: 1.2rem; font-weight: 800; }
        .logo span { color: var(--point-silver); font-weight: 300; }

        /* 메인 영역 레이아웃 조정 */
        main { 
            flex: 1; display: flex; flex-direction: column; padding: 15px; gap: 10px; 
            overflow: hidden; /* 내부 요소들이 각각 스크롤되도록 설정 */
        }

        .player-container {
            position: relative; background: #000; border-radius: 12px;
            overflow: hidden; aspect-ratio: 16 / 9; border: 1px solid var(--border);
            cursor: grab; flex-shrink: 0;
        }

        #motionCanvas { width: 100%; height: 100%; display: block; }
        
        .playback-controls { display: flex; justify-content: center; gap: 20px; align-items: center; margin: 5px 0; flex-shrink: 0; }
        .skip-btn { background: none; border: 1px solid #444; color: #aaa; padding: 6px 15px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; }
        
        /* 타임라인 영역 - 스크롤 가능하게 */
        .timeline-editor {
            background: var(--tuxedo-dark); border-radius: 12px; border: 1px solid var(--border);
            display: flex; flex-direction: column; flex: 1; overflow: hidden;
        }
        .timeline-header { padding: 12px 15px; border-bottom: 1px solid var(--border); font-size: 0.85rem; font-weight: bold; color: var(--point-silver); display: flex; justify-content: space-between; align-items: center; }
        
        .segment-list { flex: 1; overflow-y: auto; padding: 10px; }
        .segment-item { 
            display: flex; align-items: center; gap: 10px; background: #111; 
            padding: 10px; border-radius: 8px; margin-bottom: 8px; border: 1px solid #222;
        }
        .segment-time { font-size: 0.75rem; color: var(--highlight-green); min-width: 90px; }
        .segment-label-select { 
            background: #222; color: white; border: 1px solid #444; padding: 6px; 
            border-radius: 4px; font-size: 0.8rem; flex: 1; 
        }

        /* 하단 제어판 고정 */
        .control-panel { 
            background: var(--tuxedo-dark); padding: 15px; border-radius: 12px; 
            border: 1px solid var(--border); flex-shrink: 0; margin-top: 5px;
        }
        .btn-group { display: flex; gap: 10px; margin-top: 5px; }
        .action-btn { flex: 1; background: #222; color: white; border: 1px solid #444; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.85rem; }
        .btn-primary { border-color: var(--highlight-blue); color: var(--highlight-blue); }

        input[type=range] { flex: 1; accent-color: var(--highlight-green); cursor: pointer; }
    </style>
</head>
<body>

<header>
    <div class="logo">CrystalTory <span>Motion</span></div>
    <div id="aiStatus" style="font-size: 0.75rem; color: var(--point-silver);">🐾 V5.0 준비 중</div>
</header>

<main>
    <input type="file" id="videoUpload" accept="video/*" style="font-size: 0.85rem; margin-bottom: 5px;">

    <div class="player-container" id="playerContainer">
        <canvas id="motionCanvas"></canvas>
    </div>

    <div class="playback-controls">
        <button class="skip-btn" onclick="skip(-10)">-10s</button>
        <button onclick="togglePlay()" id="playBtn" style="background:none; border:none; color:white; font-size:1.8rem; cursor:pointer;">▶</button>
        <button class="skip-btn" onclick="skip(10)">+10s</button>
    </div>

    <input type="range" id="seekBar" value="0" step="0.1" style="width: 100%; margin-bottom: 5px;">

    <div class="timeline-editor">
        <div class="timeline-header">
            <span>🎥 자동 모션 구간</span>
            <button onclick="autoGenerateSegments()" style="background:none; border:none; color:var(--highlight-blue); font-size:0.75rem; cursor:pointer; font-weight:bold;">⚡ 자동 구간 생성</button>
        </div>
        <div class="segment-list" id="segmentList">
            <p style="text-align:center; color:#555; font-size:0.8rem; margin-top:20px;">영상을 재생한 뒤 자동 구간 생성을 눌러주세요.</p>
        </div>
    </div>

    <div class="control-panel">
        <div class="btn-group">
            <button class="action-btn" onclick="resetCenter()">🎯 중앙 초기화</button>
            <button class="action-btn btn-primary" id="exportBtn" onclick="exportData()">💾 최종 데이터 저장</button>
        </div>
    </div>
</main>

<video id="hiddenVideo" style="display:none;" crossOrigin="anonymous"></video>

<script>
    const video = document.getElementById('hiddenVideo');
    const canvas = document.getElementById('motionCanvas');
    const ctx = canvas.getContext('2d');
    const seekBar = document.getElementById('seekBar');
    const videoUpload = document.getElementById('videoUpload');
    const playBtn = document.getElementById('playBtn');
    const playerContainer = document.getElementById('playerContainer');
    const aiStatus = document.getElementById('aiStatus');
    const segmentListUI = document.getElementById('segmentList');

    let zoom = 2.5; let panSensitivity = 2.5; 
    let centerX = 0; let centerY = 0;
    let targetX = 0; let targetY = 0;
    let isDragging = false;
    let lastMouseX = 0; let lastMouseY = 0;

    let trackData = []; 
    let segments = [];
    let model = null;
    let isDetecting = false;

    const MOTION_TAGS = ['기본 트래킹', '스타트', '슬라럼', '웨이크 진입', '점프', '에어 타임', '랜딩', '피니시'];

    // AI 모델 로드
    cocoSsd.load().then(m => { 
        model = m; 
        aiStatus.innerText = "🟢 AI 엔진 준비 완료"; 
    }).catch(err => {
        aiStatus.innerText = "🔴 엔진 로드 실패";
        console.error(err);
    });

    videoUpload.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            video.src = URL.createObjectURL(file);
            video.onloadedmetadata = () => {
                seekBar.max = video.duration;
                centerX = video.videoWidth / 2; centerY = video.videoHeight / 2;
                targetX = centerX; targetY = centerY;
                render();
            };
        }
    });

    function skip(amount) { video.currentTime = Math.max(0, Math.min(video.duration, video.currentTime + amount)); }

    // 드래그 방향 수정 (물체 직접 잡기)
    function startDrag(e) { 
        isDragging = true; 
        const clientX = e.clientX || (e.touches && e.touches[0].clientX);
        const clientY = e.clientY || (e.touches && e.touches[0].clientY);
        lastMouseX = clientX; lastMouseY = clientY; 
    }
    function drag(e) {
        if (!isDragging) return;
        const clientX = e.clientX || (e.touches && e.touches[0].clientX);
        const clientY = e.clientY || (e.touches && e.touches[0].clientY);
        
        const dx = clientX - lastMouseX; const dy = clientY - lastMouseY;
        const scale = ((video.videoWidth / zoom) / playerContainer.offsetWidth) * panSensitivity;
        
        centerX -= dx * scale; 
        centerY -= dy * scale;
        
        targetX = centerX; targetY = centerY;
        lastMouseX = clientX; lastMouseY = clientY;
    }
    function endDrag() { isDragging = false; }

    playerContainer.addEventListener('mousedown', startDrag);
    window.addEventListener('mousemove', drag);
    window.addEventListener('mouseup', endDrag);
    playerContainer.addEventListener('touchstart', startDrag, {passive: false});
    window.addEventListener('touchmove', (e) => { if(isDragging) { e.preventDefault(); drag(e.touches[0]); } }, {passive: false});
    window.addEventListener('touchend', endDrag);

    async function detectPerson() {
        if (!model || video.paused || isDetecting || isDragging) return;
        isDetecting = true;
        try {
            const predictions = await model.detect(canvas); 
            const person = predictions.find(p => p.class === 'person');
            if (person) {
                const bx = person.bbox[0] + person.bbox[2]/2;
                const by = person.bbox[1] + person.bbox[3]/2;
                const viewW = canvas.width / zoom; const viewH = canvas.height / zoom;
                targetX = (centerX - viewW/2) + (bx / canvas.width) * viewW;
                targetY = (centerY - viewH/2) + (by / canvas.height) * viewH;
                aiStatus.style.color = "var(--highlight-green)";
            } else { 
                aiStatus.style.color = "var(--point-silver)";
            }
        } catch(e) { console.error("AI Error:", e); }
        finally { isDetecting = false; }
    }

    function autoGenerateSegments() {
        if (isNaN(video.duration) || video.duration === 0) return;
        segments = [];
        const interval = 5; 
        for (let i = 0; i < video.duration; i += interval) {
            segments.push({
                id: Date.now() + i,
                start: i,
                end: Math.min(i + interval, video.duration),
                label: '기본 트래킹'
            });
        }
        updateSegmentListUI();
    }

    function updateSegmentListUI() {
        segmentListUI.innerHTML = '';
        if (segments.length === 0) {
            segmentListUI.innerHTML = '<p style="text-align:center; color:#555; font-size:0.8rem; margin-top:20px;">구간이 없습니다.</p>';
            return;
        }
        segments.forEach(seg => {
            const item = document.createElement('div');
            item.className = 'segment-item';
            item.innerHTML = `
                <span class="segment-time">${formatTime(seg.start)} ~ ${formatTime(seg.end)}</span>
                <select class="segment-label-select" onchange="updateSegmentLabel(${seg.id}, this.value)">
                    ${MOTION_TAGS.map(tag => `<option value="${tag}" ${seg.label === tag ? 'selected' : ''}>${tag}</option>`).join('')}
                </select>
                <button onclick="video.currentTime=${seg.start}" style="background:none; border:1px solid #444; color:#aaa; font-size:0.7rem; padding:4px 8px; border-radius:4px; cursor:pointer;">이동</button>
                <button onclick="deleteSegment(${seg.id})" style="background:none; border:none; color:var(--highlight-red); cursor:pointer; font-size:0.8rem;">삭제</button>
            `;
            segmentListUI.appendChild(item);
        });
    }

    function updateSegmentLabel(id, newLabel) {
        const seg = segments.find(s => s.id === id);
        if (seg) seg.label = newLabel;
    }

    function deleteSegment(id) {
        segments = segments.filter(s => s.id !== id);
        updateSegmentListUI();
    }

    function render() {
        if (video.videoWidth === 0) { requestAnimationFrame(render); return; }
        if (!video.paused && !isDragging) detectPerson();

        canvas.width = playerContainer.clientWidth * window.devicePixelRatio;
        canvas.height = playerContainer.clientHeight * window.devicePixelRatio;

        if (!isDragging) {
            centerX += (targetX - centerX) * 0.15;
            centerY += (targetY - centerY) * 0.15;
        }

        const viewW = video.videoWidth / zoom; 
        const viewH = video.videoHeight / zoom;
        
        centerX = Math.max(viewW / 2, Math.min(video.videoWidth - viewW / 2, centerX));
        centerY = Math.max(viewH / 2, Math.min(video.videoHeight - viewH / 2, centerY));

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(video, centerX - viewW/2, centerY - viewH/2, viewW, viewH, 0, 0, canvas.width, canvas.height);
        
        if (!video.paused) {
            seekBar.value = video.currentTime;
            if (Math.floor(video.currentTime * 10) % 2 === 0) {
                trackData.push({t: video.currentTime.toFixed(2), x: centerX.toFixed(1), y: centerY.toFixed(1)});
            }
        }
        document.getElementById('timeDisplay').innerText = formatTime(video.currentTime) + " / " + formatTime(video.duration);
        requestAnimationFrame(render);
    }

    function exportData() {
        const data = { projectName: "CrystalTory_V5.0", segments, trackData };
        const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `motion_edit_${Math.floor(Date.now()/1000)}.json`;
        a.click();
        alert("편집 데이터가 JSON 파일로 저장되었습니다!");
    }

    function togglePlay() { 
        if (video.paused) { video.play(); playBtn.innerText = "Ⅱ"; } 
        else { video.pause(); playBtn.innerText = "▶"; } 
    }
    function resetCenter() { targetX = video.videoWidth / 2; targetY = video.videoHeight / 2; }
    function formatTime(s) { 
        const m = Math.floor(s / 60); 
        const sec = Math.floor(s % 60);
        return m.toString().padStart(2, '0') + ":" + sec.toString().padStart(2, '0'); 
    }
    seekBar.addEventListener('input', () => video.currentTime = seekBar.value);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CrystalTory_Motion V5.17 (Wipeout Edition)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        :root {
            --tuxedo-black: #0a0a0a; --tuxedo-dark: #1a1a1a;
            --tuxedo-white: #f5f5f5; --point-silver: #a0a0a0;
            --highlight-green: #bfff00; --highlight-blue: #00d2ff; --highlight-red: #ff4757; --border: #2d2d2d;
        }

        body {
            background-color: var(--tuxedo-black); color: var(--tuxedo-white);
            font-family: 'Pretendard', sans-serif; margin: 0; padding: 0;
            display: flex; flex-direction: column; min-height: 100vh;
        }

        /* 상단 고정 플레이어 영역 */
        .player-section {
            position: sticky; top: 0; z-index: 100;
            background: var(--tuxedo-black); border-bottom: 2px solid var(--border); width: 100%;
        }

        header { padding: 10px 15px; background: var(--tuxedo-dark); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1rem; font-weight: 800; }
        .logo span { color: var(--point-silver); font-weight: 300; }
        .status-badge { font-size: 0.65rem; padding: 3px 6px; border-radius: 4px; background: #333; color: #aaa; font-weight: bold; }

        .player-container { position: relative; background: #000; width: 100%; aspect-ratio: 16 / 9; max-height: 40vh; margin: 0 auto; overflow: hidden; }
        #motionCanvas { width: 100%; height: 100%; display: block; touch-action: none; cursor: grab; }
        #motionCanvas:active { cursor: grabbing; }

        .player-controls { padding: 8px 15px; background: var(--tuxedo-dark); display: flex; flex-direction: column; gap: 5px; }

        /* 하단 스크롤 편집 영역 */
        .editor-section { flex: 1; padding: 15px; display: flex; flex-direction: column; gap: 15px; background: var(--tuxedo-black); }

        .btn-row { display: flex; gap: 10px; margin-bottom: 5px; }
        .action-btn { flex: 1; background: #222; border: 1px solid #444; color: #ddd; padding: 12px; border-radius: 8px; text-align: center; font-size: 0.85rem; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-primary { border-color: var(--highlight-blue); color: var(--highlight-blue); }
        .btn-success { border-color: var(--highlight-green); color: var(--highlight-green); }

        .toggle-group { display: flex; gap: 8px; }
        .toggle-btn { flex: 1; background: #333; color: white; border: 1px solid #555; padding: 8px; border-radius: 4px; font-size: 0.75rem; cursor: pointer; font-weight: bold; }
        .toggle-btn.active { background: #002200; color: var(--highlight-green); border-color: var(--highlight-green); }

        .timeline-box { background: var(--tuxedo-dark); border-radius: 12px; border: 1px solid var(--border); display: flex; flex-direction: column; }
        .timeline-header { padding: 12px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }

        .segment-list { padding: 10px; display: flex; flex-direction: column; gap: 10px; }
        .segment-item { background: #111; padding: 12px; border-radius: 8px; border: 1px solid #222; display: flex; flex-direction: column; gap: 8px; transition: 0.3s; }
        .segment-item.active { border-color: var(--highlight-green); background: #1a221a; transform: scale(1.01); }

        .seg-row { display: flex; gap: 10px; align-items: center; }
        .seg-select { background: #222; color: white; border: 1px solid #444; padding: 6px; border-radius: 4px; flex: 1; font-size: 0.8rem; font-weight: bold; }
        
        .time-ctrl { display: flex; align-items: center; gap: 8px; background: #222; padding: 4px 10px; border-radius: 6px; }
        .time-btn { background: transparent; border: none; color: white; font-size: 1.2rem; cursor: pointer; }
        
        .seg-seekbar { width: 100%; height: 6px; accent-color: var(--highlight-blue); cursor: pointer; background: #333; border-radius: 3px; }

        input[type=range] { accent-color: var(--highlight-green); cursor: pointer; }
    </style>
</head>
<body>

<div class="player-section">
    <header>
        <div class="logo">CrystalTory <span>Motion</span></div>
        <div style="display: flex; gap: 8px;">
            <span id="modeStatus" class="status-badge" style="background:var(--highlight-blue); color:black;">📺 리플레이</span>
            <span id="aiStatus" class="status-badge">🧠 대기중</span>
        </div>
    </header>

    <div class="player-container" id="playerContainer">
        <canvas id="motionCanvas"></canvas>
    </div>

    <div class="player-controls">
        <div style="display:flex; align-items:center; gap:12px;">
            <button class="action-btn" style="padding:5px; max-width:50px;" onclick="skip(-10)">-10s</button>
            <button onclick="togglePlay()" id="playBtn" style="background:none; border:none; color:white; font-size:1.8rem; cursor:pointer; width:40px;">▶</button>
            <button class="action-btn" style="padding:5px; max-width:50px;" onclick="skip(10)">+10s</button>
            <input type="range" id="seekBar" value="0" step="0.1" style="flex: 1;">
            <span id="timeDisplay" style="font-size:0.75rem; min-width:80px; text-align:right;">00:00/00:00</span>
        </div>
        <div class="toggle-group">
            <button id="btnAutoZoom" class="toggle-btn" onclick="toggleAutoZoom()">🔍 오토줌 OFF</button>
            <button id="btnShowAI" class="toggle-btn active" onclick="toggleShowAI()">👁️ 인식표시 ON</button>
            <button class="toggle-btn" style="border-color:var(--highlight-blue); color:var(--highlight-blue);" onclick="exportEntireVideo()">🎬 전체 저장</button>
        </div>
    </div>
</div>

<div class="editor-section">
    <div class="btn-row">
        <label class="action-btn">🎬 영상 열기<input type="file" id="videoUpload" accept="video/*" style="display:none;"></label>
        <label class="action-btn btn-primary">📁 작업 불러오기<input type="file" id="jsonUpload" accept=".json" style="display:none;"></label>
    </div>

    <div class="timeline-box">
        <div class="timeline-header">
            <span style="font-size:0.85rem; font-weight:bold;">🎞️ 스마트 타임라인</span>
            <button onclick="mergeIntoOneSegment()" style="color:white; border:1px solid #555; background:#333; padding:4px 8px; border-radius:4px; font-size:0.75rem; cursor:pointer;">🗑️ 전체 통합 (1개)</button>
        </div>
        <div style="padding:10px; display:flex; gap:8px; border-bottom:1px solid #222;">
            <button class="toggle-btn" onclick="batchExtract()">선택 추출</button>
            <button class="toggle-btn" onclick="batchDelete()" style="color:var(--highlight-red);">선택 삭제</button>
            <button class="toggle-btn" onclick="autoGenerateSegments()" style="color:var(--highlight-green);">✨ 자동 분석</button>
        </div>
        <div class="segment-list" id="segmentList"></div>
    </div>

    <div class="btn-row" style="margin-top:10px;">
        <button class="action-btn" onclick="resetCenter()">🎯 트래킹 초기화</button>
        <button class="action-btn btn-success" onclick="exportData()">💾 JSON 저장</button>
    </div>
</div>

<video id="hiddenVideo" style="display:none;" playsinline muted></video>

<script>
    const video = document.getElementById('hiddenVideo');
    const canvas = document.getElementById('motionCanvas');
    const ctx = canvas.getContext('2d');
    const seekBar = document.getElementById('seekBar');
    const playBtn = document.getElementById('playBtn');
    const aiStatus = document.getElementById('aiStatus');
    const modeStatus = document.getElementById('modeStatus');
    const segmentListUI = document.getElementById('segmentList');
    const btnAutoZoom = document.getElementById('btnAutoZoom');
    const btnShowAI = document.getElementById('btnShowAI');

    let currentZoom = 2.5; let targetZoom = 2.5;  
    let isAutoZoom = false; let showAIIndicator = true;
    let centerX = 0; let centerY = 0;
    let targetX = 0; let targetY = 0;
    let isDragging = false; let lastMouseX = 0; let lastMouseY = 0;

    let trackData = []; let segments = [];
    let model = null; let isDetecting = false; 
    let detectedBBox = null;
    let activeSegmentId = null;
    let renderStarted = false;
    let isSegDragging = false; 

    // [V5.17] 낙수 태그 추가
    const MOTION_TAGS = ['기본 트래킹', '스타트', '슬라럼', '웨이크 진입', '점프', '에어 타임', '랜딩', '피니시', '낙수', '대기/이탈'];

    cocoSsd.load().then(m => { model = m; aiStatus.innerText = "🟢 AI 준비"; aiStatus.style.color = "var(--highlight-green)"; });

    // [V5.17] 단축키 강화: 스페이스바(재생), 방향키(10초 이동)
    window.addEventListener('keydown', (e) => { 
        if(e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
        if(e.code === 'Space') { e.preventDefault(); togglePlay(); }
        if(e.code === 'ArrowRight') { e.preventDefault(); skip(10); }
        if(e.code === 'ArrowLeft') { e.preventDefault(); skip(-10); }
    });

    function skip(amount) { if(!isNaN(video.duration)) video.currentTime = Math.max(0, Math.min(video.duration, video.currentTime + amount)); }

    const startDrag = (e) => { isDragging = true; const ev = e.touches ? e.touches[0] : e; lastMouseX = ev.clientX; lastMouseY = ev.clientY; };
    const doDrag = (e) => {
        if (!isDragging) return; const ev = e.touches ? e.touches[0] : e;
        const dx = ev.clientX - lastMouseX; const dy = ev.clientY - lastMouseY;
        const scale = ((video.videoWidth / currentZoom) / canvas.offsetWidth) * 2.0;
        centerX -= dx * scale; centerY -= dy * scale; targetX = centerX; targetY = centerY;
        lastMouseX = ev.clientX; lastMouseY = ev.clientY;
    };
    canvas.addEventListener('mousedown', startDrag); window.addEventListener('mousemove', doDrag); window.addEventListener('mouseup', () => isDragging=false);
    canvas.addEventListener('touchstart', startDrag, {passive:false}); canvas.addEventListener('touchmove', (e) => { e.preventDefault(); doDrag(e); }, {passive:false}); canvas.addEventListener('touchend', () => isDragging=false);

    function getStoredTrack(time) {
        const rounded = Math.round(time * 10) / 10;
        return trackData.find(d => Math.abs(d.t - rounded) < 0.15);
    }

    async function detectPerson() {
        if (!model || video.paused || isDetecting || isDragging) return;
        const stored = getStoredTrack(video.currentTime);
        if (stored) {
            targetX = stored.x; targetY = stored.y; targetZoom = stored.z;
            modeStatus.innerText = "📺 리플레이"; modeStatus.style.background = "var(--highlight-blue)";
            detectedBBox = null; return;
        }

        isDetecting = true; modeStatus.innerText = "🔴 레코딩"; modeStatus.style.background = "var(--highlight-red)";
        try {
            const predictions = await model.detect(canvas); 
            const person = predictions.find(p => p.class === 'person');
            if (person) {
                detectedBBox = person.bbox;
                const vW = canvas.width / currentZoom; const vH = canvas.height / currentZoom;
                targetX = (centerX - vW/2) + (person.bbox[0] + person.bbox[2]/2) / canvas.width * vW;
                targetY = (centerY - vH/2) + (person.bbox[1] + person.bbox[3]/2) / canvas.height * vH;
                if(isAutoZoom) targetZoom = Math.max(1.2, Math.min(8.0, currentZoom * (canvas.height * 0.45 / person.bbox[3])));
            }
        } finally { isDetecting = false; }
    }

    function render() {
        if (video.readyState < 2) { requestAnimationFrame(render); return; }
        if (!video.paused && !isDragging) detectPerson();

        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        if (!isDragging) {
            centerX += (targetX - centerX) * 0.15; centerY += (targetY - centerY) * 0.15;
            currentZoom += (targetZoom - currentZoom) * 0.1;
        }

        const vW = canvas.width / currentZoom; const vH = canvas.height / currentZoom;
        centerX = Math.max(vW / 2, Math.min(canvas.width - vW / 2, centerX));
        centerY = Math.max(vH / 2, Math.min(canvas.height - vH / 2, centerY));
        ctx.drawImage(video, centerX - vW/2, centerY - vH/2, vW, vH, 0, 0, canvas.width, canvas.height);

        if (showAIIndicator && detectedBBox) {
            const sX = canvas.width / vW; const sY = canvas.height / vH;
            ctx.strokeStyle = "var(--highlight-blue)"; ctx.lineWidth = 4;
            ctx.strokeRect((detectedBBox[0]-(centerX-vW/2))*sX, (detectedBBox[1]-(centerY-vH/2))*sY, detectedBBox[2]*sX, detectedBBox[3]*sY);
        }

        if (!video.paused) {
            const cur = video.currentTime; seekBar.value = cur;
            if (modeStatus.innerText === "🔴 레코딩" && Math.floor(cur * 10) % 2 === 0) {
                trackData = trackData.filter(d => Math.abs(d.t - cur) > 0.1);
                trackData.push({ t: Math.round(cur * 10) / 10, x: centerX, y: centerY, z: currentZoom });
            }
            updateActiveSegment(cur);
            if (!isSegDragging) {
                document.querySelectorAll('.seg-seekbar').forEach(bar => {
                    if (cur >= parseFloat(bar.min) && cur <= parseFloat(bar.max)) bar.value = cur;
                });
            }
        }
        document.getElementById('timeDisplay').innerText = formatTime(video.currentTime) + " / " + formatTime(video.duration);
        requestAnimationFrame(render);
    }

    function updateActiveSegment(time) {
        const active = segments.find(s => time >= s.start && time <= s.end);
        if (active && active.id !== activeSegmentId) {
            activeSegmentId = active.id;
            document.querySelectorAll('.segment-item').forEach(el => el.classList.remove('active'));
            const activeEl = document.getElementById(`seg_${active.id}`);
            if (activeEl) { activeEl.classList.add('active'); }
        }
    }

    videoUpload.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) { 
            video.src = URL.createObjectURL(file); 
            video.onloadedmetadata = () => { 
                seekBar.max = video.duration; 
                centerX = video.videoWidth/2; centerY = video.videoHeight/2;
                targetX = centerX; targetY = centerY;
                segments = [{ id: Date.now(), start: 0, end: Math.floor(video.duration), label: '기본 트래킹', selected: false }];
                updateSegmentListUI();
                if(!renderStarted) { renderStarted = true; render(); }
            }; 
        }
    });

    jsonUpload.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            const data = JSON.parse(ev.target.result);
            trackData = data.trackData || []; segments = data.segments || [];
            updateSegmentListUI();
        };
        reader.readAsText(file);
    });

    function updateSegmentListUI() {
        segmentListUI.innerHTML = '';
        segments.forEach(seg => {
            const item = document.createElement('div');
            item.className = 'segment-item'; item.id = `seg_${seg.id}`;
            let seekVal = (video.currentTime >= seg.start && video.currentTime <= seg.end) ? video.currentTime : seg.start;
            item.innerHTML = `
                <div class="seg-row">
                    <input type="checkbox" class="seg-check" ${seg.selected?'checked':''} onchange="toggleSelect(${seg.id})">
                    <select class="seg-select" onchange="updateLabel(${seg.id}, this.value)">
                        ${MOTION_TAGS.map(t => `<option value="${t}" ${seg.label===t?'selected':''}>${t}</option>`).join('')}
                    </select>
                    <button class="action-btn" style="padding:5px 10px; background:#444;" onclick="splitSegment(${seg.id})">✂ 분할</button>
                    <button class="action-btn" style="padding:5px 10px;" onclick="playSegment(${seg.id})">▶ 재생</button>
                </div>
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div class="time-ctrl"><button class="time-btn" onclick="adjustTime(${seg.id},'start',-0.5)">-</button><span style="font-size:0.75rem; color:var(--highlight-green); min-width:40px; text-align:center;">${formatTime(seg.start)}</span><button class="time-btn" onclick="adjustTime(${seg.id},'start',0.5)">+</button></div>
                    <span style="color:#666;">~</span>
                    <div class="time-ctrl"><button class="time-btn" onclick="adjustTime(${seg.id},'end',-0.5)">-</button><span style="font-size:0.75rem; color:var(--highlight-green); min-width:40px; text-align:center;">${formatTime(seg.end)}</span><button class="time-btn" onclick="adjustTime(${seg.id},'end',0.5)">+</button></div>
                </div>
                <input type="range" class="seg-seekbar" min="${seg.start}" max="${seg.end}" step="0.1" value="${seekVal}" 
                    onmousedown="isSegDragging=true;" onmouseup="isSegDragging=false; video.currentTime=this.value;" 
                    ontouchstart="isSegDragging=true;" ontouchend="isSegDragging=false; video.currentTime=this.value;">
            `;
            segmentListUI.appendChild(item);
        });
    }

    function adjustTime(id, f, d) {
        const s = segments.find(i=>i.id===id); if(!s) return;
        const oldVal = s[f];
        s[f] = Math.round(Math.max(0, Math.min(video.duration || 9999, s[f] + d)) * 10) / 10; 
        if (s.start >= s.end) {
            if (f === 'start') s.end = Math.round((s.start + 0.5) * 10) / 10; 
            else s.start = Math.max(0, Math.round((s.end - 0.5) * 10) / 10);
        }
        if (f === 'end') {
            const next = segments.find(i => Math.abs(i.start - oldVal) <= 0.1);
            if (next) next.start = s.end;
        } else if (f === 'start') {
            const prev = segments.find(i => Math.abs(i.end - oldVal) <= 0.1);
            if (prev) prev.end = s.start;
        }
        updateSegmentListUI();
    }

    function mergeIntoOneSegment() {
        if(!confirm("모든 구간을 1개로 통합할까요?")) return;
        segments = [{ id: Date.now(), start: 0, end: Math.floor(video.duration), label: '기본 트래킹', selected: false }];
        updateSegmentListUI();
    }

    function splitSegment(id) {
        const idx = segments.findIndex(s => s.id === id); if(idx === -1) return;
        const seg = segments[idx];
        let mid = Math.round(video.currentTime * 10) / 10;
        if (mid <= seg.start || mid >= seg.end) { mid = Math.round(((seg.start + seg.end) / 2) * 10) / 10; }
        const newSeg = { id: Date.now(), start: mid, end: seg.end, label: seg.label, selected: false };
        seg.end = mid; segments.splice(idx + 1, 0, newSeg); updateSegmentListUI();
    }

    function togglePlay() { video.paused ? (video.play(), playBtn.innerText="Ⅱ") : (video.pause(), playBtn.innerText="▶"); }
    function toggleAutoZoom() { isAutoZoom = !isAutoZoom; btnAutoZoom.innerText = isAutoZoom ? "🔍 오토줌 ON" : "🔍 오토줌 OFF"; btnAutoZoom.classList.toggle('active'); }
    function toggleShowAI() { showAIIndicator = !showAIIndicator; btnShowAI.innerText = showAIIndicator ? "👁️ 인식표시 ON" : "👁️ 인식표시 OFF"; btnShowAI.classList.toggle('active'); }
    function formatTime(s) { const m = Math.floor(s/60); const sec = Math.floor(s%60); return m.toString().padStart(2,'0')+":"+sec.toString().padStart(2,'0'); }
    function toggleSelect(id) { const s = segments.find(i=>i.id===id); if(s) s.selected = !s.selected; }
    function updateLabel(id, v) { const s = segments.find(i=>i.id===id); if(s) s.label = v; }
    function batchDelete() { segments = segments.filter(s=>!s.selected); updateSegmentListUI(); }
    function resetCenter() { targetX = video.videoWidth/2; targetY = video.videoHeight/2; targetZoom = 2.5; trackData = []; alert("초기화되었습니다."); }
    function exportData() { const data = { trackData, segments }; const blob = new Blob([JSON.stringify(data)], {type:'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `Tory_Work.json`; a.click(); }

    function playSegment(id) {
        const s = segments.find(i=>i.id===id); if(!s) return;
        video.currentTime = s.start; video.play(); playBtn.innerText="Ⅱ";
        const checker = () => { if(video.currentTime >= s.end) { video.pause(); playBtn.innerText="▶"; video.removeEventListener('timeupdate', checker); } };
        video.addEventListener('timeupdate', checker);
    }

    async function exportEntireVideo() {
        if(!confirm("전체 영상을 추출할까요?")) return;
        const origTime = video.currentTime; video.currentTime = 0; await new Promise(r => video.onseeked = r);
        const stream = canvas.captureStream(30); const recorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
        const chunks = []; recorder.ondataavailable = e => chunks.push(e.data);
        recorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'video/webm' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `Tory_Full_Highlight.webm`; a.click();
            video.currentTime = origTime;
        };
        recorder.start(); video.play();
        const checker = () => { if(video.currentTime >= video.duration - 0.1) { video.pause(); recorder.stop(); video.removeEventListener('timeupdate', checker); } };
        video.addEventListener('timeupdate', checker);
    }

    async function batchExtract() {
        const selectedSegs = segments.filter(s => s.selected);
        if(selectedSegs.length === 0) return alert("추출할 구간을 선택해주세요.");
        for(let seg of selectedSegs) {
            await new Promise(async (resolve) => {
                video.currentTime = seg.start; await new Promise(r => video.addEventListener('seeked', r, {once: true}));
                const stream = canvas.captureStream(30); const recorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
                let chunks = []; recorder.ondataavailable = e => chunks.push(e.data);
                recorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'video/webm' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
                    a.download = `Tory_${seg.label}_${formatTime(seg.start)}.webm`; a.click(); resolve();
                };
                recorder.start(); video.play();
                const checker = () => { if(video.currentTime >= seg.end) { video.pause(); recorder.stop(); video.removeEventListener('timeupdate', checker); } };
                video.addEventListener('timeupdate', checker);
            });
        }
    }

    function autoGenerateSegments() {
        if(trackData.length < 10) return alert("데이터가 부족합니다.");
        segments = []; let win = 3;
        for(let t=0; t<video.duration; t+=win) {
            const chunk = trackData.filter(d => d.t >= t && d.t < t+win);
            if(chunk.length > 0) {
                const ys = chunk.map(d=>parseFloat(d.y)); const xs = chunk.map(d=>parseFloat(d.x));
                const diffY = Math.max(...ys) - Math.min(...ys); const diffX = Math.max(...xs) - Math.min(...xs);
                let label = (diffY > canvas.height * 0.15) ? '점프' : (diffX > canvas.width * 0.2) ? '슬라럼' : '기본 트래킹';
                segments.push({ id: Date.now()+t, start: t, end: Math.min(video.duration, t+win), label, selected: false });
            }
        }
        updateSegmentListUI();
    }

    seekBar.addEventListener('input', () => { video.currentTime = seekBar.value; });
</script>
</body>
</html>

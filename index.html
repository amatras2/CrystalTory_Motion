<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrystalTory_Motion V3.0 (AI Tracker)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        :root {
            --tuxedo-black: #0a0a0a;
            --tuxedo-dark: #1a1a1a;
            --tuxedo-white: #f5f5f5;
            --point-silver: #a0a0a0;
            --highlight-green: #bfff00;
            --border: #2d2d2d;
        }

        body {
            background-color: var(--tuxedo-black);
            color: var(--tuxedo-white);
            font-family: 'Pretendard', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            padding: 15px 25px;
            background: var(--tuxedo-dark);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo { font-size: 1.2rem; font-weight: 800; }
        .logo span { color: var(--point-silver); }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 15px;
            gap: 15px;
            overflow-y: auto;
        }

        /* --- Player Section --- */
        .player-container {
            position: relative;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 16 / 9;
            border: 1px solid var(--border);
        }

        #motionCanvas { width: 100%; height: 100%; display: block; }

        /* AI 로딩 상태 표시 */
        #loadingStatus {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            padding: 20px;
            border-radius: 10px;
            color: var(--highlight-green);
            display: none;
            z-index: 10;
        }

        /* --- Control Panel --- */
        .control-panel {
            background: var(--tuxedo-dark);
            padding: 15px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .seek-container { display: flex; align-items: center; gap: 10px; }
        #seekBar { flex: 1; cursor: pointer; accent-color: var(--highlight-green); }

        .zoom-container {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 0.9rem;
            color: var(--point-silver);
        }
        #zoomRange { flex: 1; accent-color: var(--tuxedo-white); }

        /* --- AI Control Bar --- */
        .ai-control-bar {
            display: flex;
            gap: 10px;
            background: #111;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }
        .btn-ai {
            flex: 1;
            background: var(--tuxedo-dark);
            color: var(--point-silver);
            border: 1px solid var(--border);
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        .btn-ai:hover { background: #222; color: white; border-color: var(--point-silver); }
        .btn-ai.active { background: var(--highlight-green); color: black; font-weight: bold; border-color: var(--highlight-green); }

        footer { padding: 10px; text-align: center; font-size: 0.7rem; color: #333; }
    </style>
</head>
<body>

<header>
    <div class="logo">CRYSTAL TORY <span>MOTION</span></div>
    <div style="font-size: 0.8rem; color: var(--point-silver);">수정아빠의 AI 턱시도 작업실 🐾</div>
</header>

<main>
    <input type="file" id="videoUpload" accept="video/*">

    <div class="player-container">
        <canvas id="motionCanvas"></canvas>
        <div id="loadingStatus">AI 모델 로딩 중... (Tory-Tracker v3.0)</div>
    </div>

    <div class="control-panel">
        <div class="seek-container">
            <button onclick="togglePlay()" id="playBtn" style="background:none; border:none; color:white; font-size:1.2rem; cursor:pointer;">▶</button>
            <input type="range" id="seekBar" value="0" step="0.1">
            <span id="timeDisplay" style="font-size:0.75rem; min-width:75px;">00:00 / 00:00</span>
        </div>

        <div class="zoom-container">
            <span>ZOOM</span>
            <input type="range" id="zoomRange" min="1" max="5" step="0.1" value="1.5">
            <span id="zoomVal">1.5x</span>
        </div>
    </div>

    <div class="ai-control-bar">
        <button class="btn-ai" id="aiTrackBtn" onclick="toggleAITracking()">AI 추적 시작 (Rider Tracking)</button>
        <button class="btn-ai" onclick="resetTracking()">추적 초기화</button>
    </div>

</main>

<footer>© 2026 CrystalTory_Motion | Created for Crystal, Tory & Dad</footer>

<video id="hiddenVideo" style="display:none;"></video>

<script>
    const video = document.getElementById('hiddenVideo');
    const canvas = document.getElementById('motionCanvas');
    const ctx = canvas.getContext('2d');
    const seekBar = document.getElementById('seekBar');
    const zoomRange = document.getElementById('zoomRange');
    const zoomVal = document.getElementById('zoomVal');
    const videoUpload = document.getElementById('videoUpload');
    const playBtn = document.getElementById('playBtn');
    const loadingStatus = document.getElementById('loadingStatus');
    const aiTrackBtn = document.getElementById('aiTrackBtn');

    let model = null;
    let isAITracking = false;
    let isDetecting = false; // 🔒 과부하 방지용 잠금장치 (추가됨!)
    let aiStatusText = "대기 중"; // AI 상태 표시 텍스트
    let zoom = 1.5;
    
    let currentCenterX = 0;
    let currentCenterY = 0;
    let targetCenterX = 0;
    let targetCenterY = 0;
    const smoothingFactor = 0.05; // 더 부드럽게 이동하도록 수치 조정

    async function loadModel() {
        loadingStatus.style.display = 'block';
        model = await cocoSsd.load();
        loadingStatus.style.display = 'none';
        console.log("AI Model Loaded: Tory-Tracker v3.0.1");
    }
    loadModel();

    videoUpload.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            video.src = URL.createObjectURL(file);
            video.onloadedmetadata = () => {
                seekBar.max = video.duration;
                currentCenterX = targetCenterX = video.videoWidth / 2;
                currentCenterY = targetCenterY = video.videoHeight / 2;
                render();
            };
        }
    });

    function togglePlay() {
        if (video.paused) { video.play(); playBtn.innerText = "Ⅱ"; }
        else { video.pause(); playBtn.innerText = "▶"; }
    }

    seekBar.addEventListener('input', () => { video.currentTime = seekBar.value; });

    zoomRange.addEventListener('input', (e) => {
        zoom = e.target.value;
        zoomVal.innerText = zoom + 'x';
    });

    function toggleAITracking() {
        if (!model) { alert("AI 모델이 아직 로딩 중입니다. 잠시만 기다려주세요!"); return; }
        isAITracking = !isAITracking;
        if (isAITracking) {
            aiTrackBtn.innerText = "AI 추적 중... (Ⅱ 중지)";
            aiTrackBtn.classList.add('active');
        } else {
            aiTrackBtn.innerText = "AI 추적 시작 (Rider Tracking)";
            aiTrackBtn.classList.remove('active');
            aiStatusText = "추적 중지됨";
        }
    }

    function resetTracking() {
        isAITracking = false;
        aiTrackBtn.innerText = "AI 추적 시작 (Rider Tracking)";
        aiTrackBtn.classList.remove('active');
        targetCenterX = video.videoWidth / 2;
        targetCenterY = video.videoHeight / 2;
        aiStatusText = "초기화됨";
    }

    // 🧠 AI 분석 핵심 로직 개선
    async function detectFrame() {
        // 이미 분석 중이거나 멈춰있으면 무시 (과부하 방지)
        if (!isAITracking || video.paused || video.ended || isDetecting) return;
        
        isDetecting = true; // 분석 시작 (문 잠금)

        try {
            // 캔버스가 아닌 '원본 영상'을 기준으로 찾습니다.
            const predictions = await model.detect(video);
            
            // 사람, 서프보드, 배 중에서 가장 확률 높은 것 찾기
            const target = predictions.filter(p => ['person', 'surfboard', 'boat'].includes(p.class))
                                      .sort((a, b) => b.score - a.score)[0];

            if (target) {
                const [x, y, width, height] = target.bbox;
                targetCenterX = x + width / 2;
                targetCenterY = y + height / 2;
                aiStatusText = `🎯 찾음! (${target.class})`;
            } else {
                aiStatusText = `👀 찾는 중... (너무 작음)`;
            }
        } catch (error) {
            console.error(error);
        } finally {
            isDetecting = false; // 분석 완료 (문 열림)
        }
    }

    function render() {
        if (video.videoWidth === 0) { requestAnimationFrame(render); return; }

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        // AI 추적 호출
        if (isAITracking) { detectFrame(); }

        currentCenterX += (targetCenterX - currentCenterX) * smoothingFactor;
        currentCenterY += (targetCenterY - currentCenterY) * smoothingFactor;

        // 화면 밖으로 안 나가게 보정
        currentCenterX = Math.max(canvas.width/zoom/2, Math.min(canvas.width - canvas.width/zoom/2, currentCenterX));
        currentCenterY = Math.max(canvas.height/zoom/2, Math.min(canvas.height - canvas.height/zoom/2, currentCenterY));

        const sw = canvas.width / zoom;
        const sh = canvas.height / zoom;
        const sx = currentCenterX - sw / 2;
        const sy = currentCenterY - sh / 2;

        ctx.drawImage(video, sx, sy, sw, sh, 0, 0, canvas.width, canvas.height);
        
        // AI 상태 텍스트 그리기 (화면 우측 상단)
        if (isAITracking) {
            ctx.fillStyle = "rgba(0, 0, 0, 0.6)";
            ctx.fillRect(canvas.width - 160, 10, 150, 30);
            ctx.fillStyle = "#bfff00";
            ctx.font = "16px Pretendard";
            ctx.fillText(aiStatusText, canvas.width - 150, 30);
        }

        if (!video.paused) { seekBar.value = video.currentTime; }
        
        document.getElementById('timeDisplay').innerText = 
            formatTime(video.currentTime) + " / " + formatTime(video.duration);

        requestAnimationFrame(render);
    }

    function formatTime(seconds) {
        if (isNaN(seconds)) return "00:00";
        const m = Math.floor(seconds / 60);
        const s = Math.floor(seconds % 60);
        return m.toString().padStart(2, '0') + ":" + s.toString().padStart(2, '0');
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CrystalTory_Motion V5.6.1 (Pattern Export/Import)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        :root {
            --tuxedo-black: #0a0a0a; --tuxedo-dark: #1a1a1a;
            --tuxedo-white: #f5f5f5; --point-silver: #a0a0a0;
            --highlight-green: #bfff00; --highlight-blue: #00d2ff; --highlight-red: #ff4757; --border: #2d2d2d;
            --learning-purple: #b673fe;
        } 

        body { background-color: var(--tuxedo-black); color: var(--tuxedo-white); font-family: 'Pretendard', sans-serif; margin: 0; display: flex; flex-direction: column; min-height: 100vh; } 
        header { padding: 15px 25px; background: var(--tuxedo-dark); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 50; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .logo { font-size: 1.2rem; font-weight: 800; letter-spacing: 0.5px; }
        .logo span { color: var(--point-silver); font-weight: 300; }
        .status-badge { font-size: 0.75rem; padding: 4px 8px; border-radius: 6px; background: #333; color: #aaa; transition: 0.3s; font-weight: bold; } 
        
        .db-badge { background: rgba(182, 115, 254, 0.1); color: var(--learning-purple); border: 1px solid var(--learning-purple); padding: 4px 8px; border-radius: 6px; font-size: 0.75rem; font-weight: bold; cursor: help; display: flex; align-items: center; gap: 5px; }

        main { display: flex; flex-direction: column; padding: 15px; gap: 15px; flex: 1; } 
        
        /* 파일 메뉴 레이아웃 정돈 */
        .file-ops-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .file-btn { background: #222; border: 1px solid #444; color: #ddd; padding: 12px; border-radius: 8px; text-align: center; font-size: 0.85rem; cursor: pointer; transition: 0.2s; font-weight: bold; display: flex; flex-direction: column; align-items: center; gap: 4px; justify-content: center; }
        .file-btn small { font-size: 0.65rem; color: #888; font-weight: normal; }
        .file-btn:hover { background: #2a2a2a; border-color: #555; }
        .file-btn.purple { border-color: var(--learning-purple); color: var(--learning-purple); background: rgba(182, 115, 254, 0.05); }
        .hidden-input { display: none; } 

        .player-container { position: relative; background: #000; border-radius: 12px; overflow: hidden; aspect-ratio: 16 / 9; border: 1px solid var(--border); cursor: grab; width: 100%; transition: border-color 0.2s; }
        #motionCanvas { width: 100%; height: 100%; display: block; touch-action: none; }
        
        .playback-controls { display: flex; justify-content: center; gap: 15px; align-items: center; margin-top: 5px; }
        .skip-btn { background: #222; border: 1px solid #444; color: #ddd; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; transition: 0.2s; }
        .mode-toggle-btn { background: #111; border: 1px solid var(--highlight-red); color: var(--highlight-red); padding: 8px 15px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; font-weight: bold; transition: 0.3s; }
        
        .timeline-editor { background: var(--tuxedo-dark); border-radius: 12px; border: 1px solid var(--border); display: flex; flex-direction: column; min-height: 400px; overflow: hidden; }
        .timeline-header { padding: 12px 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: #1f1f1f; }
        .segment-list { padding: 10px; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; max-height: 450px; position: relative; scroll-behavior: smooth; }
        .segment-item { display: flex; flex-direction: column; gap: 8px; background: #111; padding: 12px; border-radius: 8px; border: 1px solid #222; transition: 0.3s; }
        .seg-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
        .segment-label-select { background: #222; color: white; border: 1px solid #444; padding: 6px; border-radius: 6px; font-size: 0.8rem; flex: 1; font-weight: bold; outline: none; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--tuxedo-dark); }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
    </style>
</head>
<body> 

<header>
    <div class="logo">CrystalTory <span>Motion</span></div>
    <div style="display: flex; gap: 10px; align-items: center;">
        <span id="patternBadge" class="db-badge">🧠 기억세포: 0개</span>
        <span id="aiStatus" class="status-badge">🟢 AI 대기 중</span>
    </div>
</header> 

<main>
    <div class="file-ops-grid">
        <label class="file-btn">
            🎬 1. 영상 열기 
            <small id="videoNameLabel">선택된 영상 없음</small>
            <input type="file" id="videoUpload" accept="video/*" class="hidden-input">
        </label>
        
        <label class="file-btn" style="border-color: var(--highlight-blue); color: var(--highlight-blue);">
            📁 2. 궤적 작업 열기
            <small>일반 JSON 불러오기</small>
            <input type="file" id="jsonUpload" accept=".json" class="hidden-input">
        </label>

        <button class="file-btn purple" onclick="exportPatternMemory()">
            📤 AI 기억 내보내기
            <small>패턴 파일 다운로드 (.json)</small>
        </button>
        <label class="file-btn purple">
            📥 AI 기억 주입하기
            <small>다른 기기의 패턴 합치기</small>
            <input type="file" id="patternUpload" accept=".json" class="hidden-input">
        </label>
    </div> 

    <div class="player-container" id="playerContainer">
        <canvas id="motionCanvas"></canvas>
    </div> 

    <div class="playback-controls">
        <button class="skip-btn" onclick="skip(-10)">-10초</button>
        <button onclick="togglePlay()" id="playBtn" style="background:none; border:none; color:white; font-size:2.2rem; cursor:pointer; width: 50px;">▶</button>
        <button class="skip-btn" onclick="skip(10)">+10초</button>
        <button id="btnRecMode" class="mode-toggle-btn" onclick="toggleRecordMode()">🔴 AI 기록 켜짐</button>
    </div>
    
    <div style="display: flex; gap: 10px; align-items: center; margin-top: 5px;">
        <input type="range" id="seekBar" value="0" step="0.1" style="flex: 1; accent-color: var(--highlight-green);">
    </div> 

    <div class="timeline-editor">
        <div class="timeline-header">
            <span style="font-size: 0.85rem; font-weight:bold;">🎥 스마트 분석 타임라인</span>
            <button onclick="autoGenerateSegments()" style="background:rgba(182, 115, 254, 0.2); border:1px solid var(--learning-purple); padding:6px 12px; border-radius:6px; color:var(--learning-purple); font-size:0.8rem; cursor:pointer; font-weight:bold; transition: 0.2s;">
                ✨ 내 패턴으로 자동 분석
            </button>
        </div>
        <div class="segment-list" id="segmentList">
            <div style="text-align:center; padding: 30px; color:#666; font-size:0.85rem;">
                영상을 재생하여 궤적을 모은 뒤 '자동 분석'을 누르세요.<br>분석이 틀렸다면 태그를 직접 고쳐주세요. 다음번엔 고쳐주신 패턴을 기억합니다.
            </div>
        </div>
    </div> 
</main> 

<video id="hiddenVideo" style="display:none;" playsinline muted></video> 

<script>
    const video = document.getElementById('hiddenVideo');
    const canvas = document.getElementById('motionCanvas');
    const ctx = canvas.getContext('2d');
    const seekBar = document.getElementById('seekBar');
    const videoUpload = document.getElementById('videoUpload');
    const patternUpload = document.getElementById('patternUpload');
    const playBtn = document.getElementById('playBtn');
    const segmentListUI = document.getElementById('segmentList');
    const patternBadge = document.getElementById('patternBadge');

    let centerX = 0; let centerY = 0; let targetX = 0; let targetY = 0;
    let trackData = []; let segments = [];
    let isRecordMode = true; let isDragging = false;
    let model = null; 

    const MOTION_TAGS = ['기본 트래킹', '스타트', '슬라럼', '웨이크 진입', '점프', '에어 타임', '랜딩', '피니시', '낙수', '대기/이탈']; 

    // 🧠 파트너님만의 패턴 학습 메모리
    let patternMemory = JSON.parse(localStorage.getItem('Tory_PatternDB')) || [];
    updatePatternBadge();

    function updatePatternBadge() {
        patternBadge.innerText = `🧠 기억세포: ${patternMemory.length}개`;
    }

    cocoSsd.load().then(m => { model = m; }); 

    videoUpload.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            video.src = URL.createObjectURL(file);
            video.onloadedmetadata = () => {
                seekBar.max = video.duration;
                centerX = video.videoWidth / 2; centerY = video.videoHeight / 2;
                targetX = centerX; targetY = centerY;
                trackData = []; segments = []; 
                render();
            };
        }
    }); 

    // ==========================================
    // 📤/📥 AI 기억(학습 데이터) 추출 및 주입 기능
    // ==========================================
    
    // 1. 내보내기 (PC -> 파일로 저장)
    function exportPatternMemory() {
        if(patternMemory.length === 0) {
            alert("아직 기억된 패턴이 없습니다. 태그를 수정하여 학습을 먼저 진행해주세요.");
            return;
        }
        const dataStr = JSON.stringify(patternMemory, null, 2);
        const blob = new Blob([dataStr], {type: "application/json"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = "Tory_AI_Brain.json"; // 이 이름으로 저장됩니다.
        a.click();
        URL.revokeObjectURL(url);
    }

    // 2. 불러오기 (파일 -> 모바일/다른 PC에 주입)
    patternUpload.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if(!file) return;
        
        const reader = new FileReader();
        reader.onload = function(event) {
            try {
                const importedData = JSON.parse(event.target.result);
                if(Array.isArray(importedData)) {
                    // 기존 기억과 덮어씌우지 않고 합쳐줍니다(병합).
                    patternMemory = [...patternMemory, ...importedData];
                    localStorage.setItem('Tory_PatternDB', JSON.stringify(patternMemory));
                    updatePatternBadge();
                    alert(`✅ 성공적으로 ${importedData.length}개의 기억 세포를 주입했습니다!`);
                } else {
                    alert("❌ 올바른 패턴 파일이 아닙니다.");
                }
            } catch(err) {
                alert("❌ 파일을 읽는 중 오류가 발생했습니다.");
            }
        };
        reader.readAsText(file);
    });

    // ==========================================

    function skip(amount) { video.currentTime = Math.max(0, Math.min(video.duration, video.currentTime + amount)); } 
    function toggleRecordMode() { isRecordMode = !isRecordMode; }

    async function detectPerson() {
        if (!model || video.paused || isDragging) return;
        const predictions = await model.detect(canvas); 
        const persons = predictions.filter(p => p.class === 'person');
        if (persons.length > 0) {
            let person = persons.reduce((p, c) => (p.bbox[2]*p.bbox[3] > c.bbox[2]*c.bbox[3] ? p : c));
            targetX = (person.bbox[0] + person.bbox[2]/2); 
            targetY = (person.bbox[1] + person.bbox[3]/2);
        }
    } 

    function updateSegmentListUI() {
        segmentListUI.innerHTML = '';
        if(segments.length === 0) return;

        segments.forEach(seg => {
            const item = document.createElement('div');
            item.className = 'segment-item';
            item.innerHTML = `
                <div class="seg-row">
                    <span style="color:var(--highlight-green); font-size:0.8rem; min-width:40px;">${seg.start}s</span>
                    <select class="segment-label-select" onchange="updateAndLearnLabel(${seg.id}, this.value)" style="border-color: ${seg.isLearned ? 'var(--learning-purple)' : '#444'}">
                        ${MOTION_TAGS.map(tag => `<option value="${tag}" ${seg.label === tag ? 'selected' : ''}>${tag}</option>`).join('')}
                    </select>
                </div>
            `;
            segmentListUI.appendChild(item);
        });
    } 

    function updateAndLearnLabel(id, newLabel) { 
        const s = segments.find(i => i.id === id); 
        if(!s) return;
        
        s.label = newLabel; 
        s.isLearned = true; 

        const chunk = trackData.filter(d => d.t >= s.start && d.t <= s.end);
        if(chunk.length > 5) {
            const xs = chunk.map(d => parseFloat(d.x)); const ys = chunk.map(d => parseFloat(d.y));
            const feature = {
                diffX: Math.max(...xs) - Math.min(...xs), 
                diffY: Math.max(...ys) - Math.min(...ys), 
                label: newLabel
            };
            
            patternMemory.push(feature);
            localStorage.setItem('Tory_PatternDB', JSON.stringify(patternMemory));
            updatePatternBadge();
        }
        updateSegmentListUI(); 
    }
    
    function predictLabelFromMemory(diffX, diffY, defaultH, defaultW) {
        if(patternMemory.length === 0) {
            if (diffY > defaultH * 0.15) return '점프'; 
            if (diffX > defaultW * 0.20) return '슬라럼';
            return '기본 트래킹';
        }
        let bestLabel = '기본 트래킹';
        let minDistance = Infinity;
        patternMemory.forEach(memory => {
            const distance = Math.sqrt(Math.pow(memory.diffX - diffX, 2) + Math.pow(memory.diffY - diffY, 2));
            if(distance < minDistance) { minDistance = distance; bestLabel = memory.label; }
        });
        return bestLabel;
    }

    function autoGenerateSegments() {
        if (trackData.length < 30) return alert("데이터가 부족합니다. 영상을 재생하여 궤적을 수집해주세요.");
        let temp = []; let windowSize = 3; let lastT = parseFloat(trackData[trackData.length-1].t);
        const w = video.videoWidth; const h = video.videoHeight;
        
        for (let sT = 0; sT < lastT; sT += windowSize) {
            let chunk = trackData.filter(d => d.t >= sT && d.t < sT + windowSize);
            if (chunk.length === 0) continue;
            
            let xs = chunk.map(d => parseFloat(d.x)); let ys = chunk.map(d => parseFloat(d.y));
            let diffX = Math.max(...xs) - Math.min(...xs); let diffY = Math.max(...ys) - Math.min(...ys);
            
            let label = predictLabelFromMemory(diffX, diffY, h, w);
            temp.push({ start: sT, end: sT + windowSize, label: label, isLearned: false });
        }
        segments = temp.map((m, idx) => ({ id: Date.now() + idx, ...m }));
        updateSegmentListUI();
    } 

    function render() {
        if (video.videoWidth === 0) { requestAnimationFrame(render); return; }
        if (!video.paused) detectPerson();

        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        centerX += (targetX - centerX) * 0.25; centerY += (targetY - centerY) * 0.25;
        
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        ctx.strokeStyle = '#bfff00'; ctx.lineWidth = 3;
        ctx.strokeRect(centerX - 40, centerY - 40, 80, 80);

        if (!video.paused && isRecordMode) {
            let curT = Math.round(video.currentTime * 10) / 10;
            if(trackData.length === 0 || Math.abs(trackData[trackData.length-1].t - curT) >= 0.2) {
                trackData.push({t: curT, x: centerX, y: centerY});
            }
        }
        seekBar.value = video.currentTime;
        requestAnimationFrame(render);
    } 

    function togglePlay() {
        if (video.paused) { video.play(); playBtn.innerText = "Ⅱ"; }
        else { video.pause(); playBtn.innerText = "▶"; }
    } 
    seekBar.addEventListener('input', () => { video.currentTime = seekBar.value; });
</script>
</body>
</html>
